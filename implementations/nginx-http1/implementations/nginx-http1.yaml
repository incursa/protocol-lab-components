schemaVersion: "1.0"
id: nginx-http1
name: nginx HTTP/1
description: Lane-scoped nginx HTTP/1.1 target using an externally installed nginx binary.
family: nginx
role: server
targetKind: process
targetContract: process
executable: run.ps1
workingDirectory: .
dockerNetworkMode: published-port
certificateMode: none
roles:
  - server
protocols:
  - h1
supportedProtocols:
  - h1
supportedWorkloadFamilies:
  - http.application
protocolVersions:
  - http/1.1
entrypoint:
  kind: pwsh
  path: run.ps1
  arguments: []
  workingDirectory: .
ports:
  - name: http
    protocol: tcp
    default: 8080
environment:
  PLAB_HTTP_PORT: "8080"
startup:
  port:
    name: http
    environmentVariable: PLAB_HTTP_PORT
    default: 8080
  readiness:
    protocol: http
    path: /health
    expectedStatus: 200
readinessCheck:
  type: http
  url: http://127.0.0.1:${PLAB_HTTP_PORT}/health
  timeoutSeconds: 10
capabilities:
  - http.server
  - httpPlaintext
  - httpJson
supportedProtocolVersions:
  - http/1.1
supportedTestCaseIds:
  - http.core.plaintext
  - http.core.json
supportedScenarios:
  - http.core.plaintext
  - http.core.json
unsupportedKnownCases:
  - h2
  - h3
  - https
  - request-body-echo
  - server-sent-events
requiredExternalTools:
  - nginx
endpoints:
  plaintext:
    method: GET
    path: /plaintext
  json:
    method: GET
    path: /json
shutdownBehavior: process
artifactExports:
  - nginx-http1.log
qlogSupport: false
sslKeyLogSupport: false
notes: HTTP/1-only nginx lane. Do not use as an nginx HTTP/2 or HTTP/3 package.
