# Load Profile Contract v1
schemaVersion: protocol-lab.load-profile.v1

id: diagnostic
title: Diagnostic
status: stable
purpose: diagnostic

description: >
  Short profile for protocol diagnostics and artifact capture. Diagnostic
  evidence may include higher-overhead observations and is not publishable
  benchmark evidence by itself.

durationSeconds: 10
warmupSeconds: 1
cooldownSeconds: 1
repetitions: 1

http1:
  connections: 1
  concurrency: 1
  requestTimeoutSeconds: 10

http2:
  connections: 1
  concurrency: 8
  streamsPerConnection: 8
  requestTimeoutSeconds: 10

http3:
  connections: 1
  concurrency: 8
  streamsPerConnection: 8
  requestTimeoutSeconds: 10

quic:
  connections: 1
  streamsPerConnection: 16
  streamBytes: 1024
  connectionTimeoutSeconds: 10
  idleTimeoutSeconds: 10

evidence:
  minimumTier: diagnostic
  publishable: false

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
    - validation.json
    - result.json
  optional:
    - counters
    - protocol-diagnostic-artifact
    - telemetry-bundle.json
