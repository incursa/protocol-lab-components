schemaVersion: "1.0"
id: bind9-dot
name: BIND 9 DoT Authority
description: Docker-backed BIND 9 DoT Authority target with immutable upstream image identity.
family: bind9
role: authoritative-server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-bind9-dot:0.1.0
dockerfile: docker/Dockerfile
buildContext: docker
dockerNetworkMode: published-port
baseUrl: tls://127.0.0.1:20530
dockerBaseUrl: tls://127.0.0.1:20530
protocolBaseUrls: {dot: tls://127.0.0.1:20530}
dockerProtocolBaseUrls: {dot: tls://127.0.0.1:20530}
certificateMode: plab-secure-dns-single-leaf-p256-v1
roles: [authoritative-server]
protocols: [dot]
supportedProtocols: [dot]
supportedWorkloadFamilies: [dns.secure]
supportedProtocolVersions: [DoT/TLS1.3]
supportedScenarios: [dns.dot.query.a]
supportedTestCaseIds: [dns.dot.query.a]
scenarioCoverage:
  dns.dot.query.a: {status: supported, executorId: go-dns-dot-executor, behavior: deterministic local plab.test. IN A answer 192.0.2.1 with TTL zero}
  dns.doh2.query.a: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.doh3.query.a: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.doh3.get.a: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.doh3.query.aaaa: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.doh3.query.cname-chain: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.doh3.query.large-dnssec-shaped: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.doh3.query.nodata: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.doh3.query.nxdomain: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.doq.query.a: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.classic.tcp.query.a: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.classic.udp.query.a: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
  dns.classic.udp-truncated-tcp-retry: {status: unsupported, reason: Separate exact transport or semantic-fixture lane required.}
unsupportedKnownCases: [dns.doh2.query.a, dns.doh3.query.a, dns.doh3.get.a, dns.doh3.query.aaaa, dns.doh3.query.cname-chain, dns.doh3.query.large-dnssec-shaped, dns.doh3.query.nodata, dns.doh3.query.nxdomain, dns.doq.query.a, dns.classic.tcp.query.a, dns.classic.udp.query.a, dns.classic.udp-truncated-tcp-retry]
ports: [{name: dot, protocol: tcp, default: 20530, hostPort: 20530, containerPort: 853}]
environment: {PLAB_SECURE_DNS_PORT: "20530"}
startup: {port: {name: dot, environmentVariable: PLAB_SECURE_DNS_PORT, default: 20530}, readiness: {protocol: process, timeoutSeconds: 30}}
readinessCheck: {type: processStarted, timeoutSeconds: 30, startupDelayMilliseconds: 1500}
capabilities: [dns.authoritative-server, dns.dot, tls13, scenario.dns.dot.query.a]
entrypoint: {kind: pwsh, path: run.ps1, arguments: [], workingDirectory: .}
shutdownBehavior: process
artifactExports: [command.txt, version.txt, stdout.txt, stderr.txt, result.json]
qlogSupport: false
sslKeyLogSupport: false
executionMetadata: {manifest: protocol-lab.internal.json}
notes: Local authoritative fixture only; recursion and external upstreams disabled.

