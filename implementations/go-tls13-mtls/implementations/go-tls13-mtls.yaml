schemaVersion: "1.0"
id: go-tls13-mtls
name: Go crypto/tls TLS 1.3 Mutual Authentication Target
description: Process target for the exact TLS 1.3 mutual-certificate handshake contract.
family: go-tls
role: library-backed-target
targetKind: process
targetContract: process
executable: bin/linux-x64/go-tls13-mtls
workingDirectory: .
baseUrl: tls://127.0.0.1:18443
protocolBaseUrls: {tls: tls://127.0.0.1:18443}
certificateMode: plab-single-leaf-p256-server-v2
roles: [server, library-backed-target]
protocols: [tls]
supportedProtocols: [tls]
supportedProtocolVersions: [TLS1.3]
supportedWorkloadFamilies: [tls, tls.lifecycle]
supportedScenarios: [tls.handshake.mutual-auth]
supportedTestCaseIds: [tls.handshake.mutual-auth]
scenarioCoverage:
  tls.handshake.full: {status: unsupported, reason: This narrow target requires the exact mutual-authentication profile.}
  tls.handshake.resumed: {status: unsupported, reason: Session resumption is disabled.}
  tls.handshake.full.tls12: {status: unsupported, reason: TLS 1.2 is disabled.}
  tls.handshake.full.chacha20: {status: unsupported, reason: The ChaCha20 profile is not implemented.}
  tls.handshake.mutual-auth: {status: supported, behavior: exact fresh TLS 1.3 handshake requiring the canonical client leaf and verified client trust chain}
  tls.early-data.accepted: {status: unsupported, reason: Early data is disabled.}
  tls.early-data.rejected: {status: unsupported, reason: Early data is disabled.}
  tls.key-update.diagnostic: {status: unsupported, reason: KeyUpdate diagnostics are not implemented.}
  tls.record.coverage: {status: unsupported, reason: Application data is forbidden by this handshake-only target.}
  tls.record.throughput: {status: unsupported, reason: Application data is forbidden by this handshake-only target.}
unsupportedKnownCases: [tls.handshake.full, tls.handshake.resumed, tls.handshake.full.tls12, tls.handshake.full.chacha20, tls.early-data.accepted, tls.early-data.rejected, tls.key-update.diagnostic, tls.record.coverage, tls.record.throughput]
ports: [{name: tls, protocol: tcp, default: 18443}]
environment: {PLAB_LISTEN_ADDRESS: 127.0.0.1:18443}
startup: {port: {name: tls, environmentVariable: PLAB_TARGET_PORT, default: 18443}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 250}
capabilities: [tls.server, tls13, tlsX25519, tlsMutualAuthentication, scenario.tls.handshake.mutual-auth]
entrypoint: {kind: process, path: bin/linux-x64/go-tls13-mtls, arguments: [], workingDirectory: .}
shutdownBehavior: process
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
notes: The package trusts only the canonical client root and accepts only the canonical client leaf identity.
