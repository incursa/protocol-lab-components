schemaVersion: "1.0"
id: go-dns-doq
name: Go DNS-over-QUIC Local Fixture Authority
description: Authoritative target serving only dns.plab-test-a.canonical over exact QUIC v1, TLS 1.3, and doq ALPN.
family: go-secure-dns
role: authoritative-server
targetKind: process
targetContract: process
executable: bin/linux-x64/go-dns-doq
workingDirectory: .
baseUrl: doq://127.0.0.1:18532
protocolBaseUrls: {doq: doq://127.0.0.1:18532}
certificateMode: plab-secure-dns-single-leaf-p256-v1
roles: [authoritative-server]
protocols: [doq]
supportedProtocols: [doq]
supportedWorkloadFamilies: [dns.secure]
supportedProtocolVersions: [DoQ/RFC9250, QUICv1, TLS1.3]
supportedScenarios: [dns.doq.query.a, dns.doq.interoperability.query.a]
supportedTestCaseIds: [dns.doq.query.a, dns.doq.interoperability.query.a]
scenarioCoverage:
  dns.doq.query.a: {status: supported, behavior: fixed local authoritative plab.test. IN A response over one client-initiated bidirectional QUIC v1 stream per query}
  dns.doq.interoperability.query.a: {status: supported, behavior: the same RFC 9250 authoritative response under the negotiated-parameter interoperability profile}
  dns.classic.tcp.query.a: {status: unsupported, reason: Classic DNS/TCP is a separate evidence lane.}
  dns.classic.udp-truncated-tcp-retry: {status: unsupported, reason: Classic DNS/UDP and fallback are absent.}
  dns.classic.udp.query.a: {status: unsupported, reason: Classic DNS/UDP is a separate evidence lane.}
  dns.doh2.query.a: {status: unsupported, reason: DoH2 is a separate evidence lane.}
  dns.doh3.get.a: {status: unsupported, reason: DoH3 GET is a separate evidence lane.}
  dns.doh3.query.a: {status: unsupported, reason: DoH3 is a separate evidence lane.}
  dns.doh3.query.aaaa: {status: unsupported, reason: The AAAA semantic fixture is not materialized.}
  dns.doh3.query.cname-chain: {status: unsupported, reason: The CNAME-chain semantic fixture is not materialized.}
  dns.doh3.query.large-dnssec-shaped: {status: unsupported, reason: The large DNSSEC-shaped fixture is not materialized.}
  dns.doh3.query.nodata: {status: unsupported, reason: The NODATA semantic fixture is not materialized.}
  dns.doh3.query.nxdomain: {status: unsupported, reason: The NXDOMAIN semantic fixture is not materialized.}
  dns.dot.query.a: {status: unsupported, reason: DoT is a separate evidence lane.}
unsupportedKnownCases: [dns.classic.tcp.query.a, dns.classic.udp-truncated-tcp-retry, dns.classic.udp.query.a, dns.doh2.query.a, dns.doh3.get.a, dns.doh3.query.a, dns.doh3.query.aaaa, dns.doh3.query.cname-chain, dns.doh3.query.large-dnssec-shaped, dns.doh3.query.nodata, dns.doh3.query.nxdomain, dns.dot.query.a]
ports: [{name: doq, protocol: udp, default: 18532, hostPort: 18532, containerPort: 18532}]
environment: {PLAB_DOQ_PORT: "18532"}
startup: {port: {name: doq, environmentVariable: PLAB_DOQ_PORT, default: 18532}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 500}
capabilities: [dns.authoritative-server, dns.doq, dns.local-fixture-only, quic-v1, tls13, scenario.dns.doq.query.a, scenario.dns.doq.interoperability.query.a]
entrypoint: {kind: process, path: bin/linux-x64/go-dns-doq, arguments: [], workingDirectory: .}
shutdownBehavior: graceful-termination
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
notes: No raw-QUIC echo, resolver, upstream, cache, UDP DNS, TCP DNS, DoT, DoH2, or DoH3 path exists. The package-local leaf private key is test-only and never an evidence artifact.
