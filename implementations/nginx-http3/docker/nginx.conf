worker_processes auto;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip off;

    server {
        listen 8443 ssl;
        listen 8443 quic reuseport;
        http3 on;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        ssl_protocols TLSv1.3;

        add_header X-ProtocolLab-Target 'nginx-http3' always;

        location = /status {
            default_type application/json;
            return 200 '{"protocol":"h3","server":"nginx","implementationId":"nginx-http3"}';
        }

        location = /plaintext {
            default_type text/plain;
            return 200 'Hello, World!';
        }

        location = /json {
            default_type application/json;
            return 200 '{"message":"Hello, World!"}';
        }

        location = /protocol-lab/metadata {
            default_type application/json;
            return 200 '{"implementationId":"nginx-http3","protocol":"h3","packageId":"org.protocol-lab.components.implementation.nginx-http3","supportedScenarios":["http3.core.plaintext","http3.core.json","http3.core.status","http3.payload.bytes.1kb","http3.payload.bytes.64kb","http3.headers.response-headers-50x32","http3.protocol.qpack-repeated-headers"]}';
        }

        location = /bytes/1024 {
            default_type application/octet-stream;
            alias /srv/bytes/1024;
        }

        location = /bytes/65536 {
            default_type application/octet-stream;
            alias /srv/bytes/65536;
        }

        location = /headers/response {
            default_type text/plain;
            add_header x-protocol-bench-header-00 "hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh" always;
            add_header x-protocol-bench-header-01 "hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh" always;
            add_header x-protocol-bench-header-02 "hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh" always;
            add_header x-protocol-bench-header-03 "hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh" always;
            add_header x-protocol-bench-header-04 "hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh" always;
            add_header x-protocol-bench-header-05 "hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh" always;
            add_header x-protocol-bench-header-06 "hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh" always;
            add_header x-protocol-bench-header-07 "hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh" always;
            add_header x-protocol-bench-header-08 "hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh" always;
