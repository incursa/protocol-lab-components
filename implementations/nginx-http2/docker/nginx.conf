worker_processes auto;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip off;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen 8080;
        http2 on;
        server_name localhost;

        add_header X-ProtocolLab-Target 'nginx-http2' always;

        location = /health {
            default_type text/plain;
            return 200 'ok';
        }

        location = /plaintext {
            default_type text/plain;
            return 200 'Hello, World!';
        }

        location = /json {
            default_type application/json;
            return 200 '{"message":"Hello, World!"}';
        }

        location = /protocol-lab/metadata {
            default_type application/json;
            return 200 '{"implementationId":"nginx-http2","protocol":"h2c-prior-knowledge","packageId":"org.protocol-lab.components.implementation.nginx-http2","supportedScenarios":["http2.core.plaintext","http2.core.json"]}';
        }
    }
}
