schemaVersion: "1.0"
id: quic.transport.sustained-download.4096x1kb
title: QUIC Sustained Download 4096x1KB
name: QUIC Sustained Download 4096x1KB
family: quic.transport
description: Validate a long-lived QUIC stream carrying exactly 4,096 sequential 1,024-byte server-to-client application writes without stream or connection churn.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: streaming-download
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
quicTransport:
  behavior: sustained-download-4096x1kb
  connectionCount: 1
  streamType: bidirectional
  streamCount: 1
  payloadSizeBytes: 4194304
  payloadDirection: server-to-client
  openPattern: sequential
  expectedBytes: 4194304
validation:
  required: true
  checks:
    - quic-transport-metrics
    - payload-bytes-delivered
    - payload-content-validated
    - completed-streams-match-expected
    - zero-timeouts-and-errors
    - client-confirms-stream-consumption
    - protocol:quic
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 5
  connections:
    - 1
    - 4
    - 16
    - 32
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - quic-stream
    - comparison
  primaryMetrics:
    - bytesPerSecond
    - streamDurationP95
    - writeCompletionP95
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - quic.stream.bytesPerSecond
  - quic.stream.completedStreams
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-unavailable-note
tags:
  - quic
  - sustained-download
  - chunk-1kb
  - payload-4mb
