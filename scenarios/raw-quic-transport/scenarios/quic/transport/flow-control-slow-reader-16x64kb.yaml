schemaVersion: "1.0"
id: quic.transport.flow-control.slow-reader-16x64kb
version: "1.0"
title: QUIC Flow Control Slow Reader 16x64 KiB
name: QUIC Flow Control Slow Reader 16x64 KiB
family: quic.transport
description: Validate sender-side QUIC backpressure with 16 concurrent 64 KiB echo streams whose client delays response reads by exactly 100 milliseconds.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
  - quicMultiplexing
quicTransport:
  behavior: flow-control-slow-reader-100ms
  connectionCount: 1
  streamType: bidirectional
  streamCount: 16
  payloadSizeBytes: 65536
  payloadDirection: bidirectional
  openPattern: concurrent
  expectedBytes: 2097152
validation:
  required: true
  checks:
    - concurrent-streams-complete
    - completed-streams-match-expected
    - echoed-bytes-match-expected
    - slow-reader-delay:100ms
    - zero-timeouts-and-errors
    - protocol:quic
benchmark:
  warmupSeconds: 5
  durationSeconds: 15
  repetitions: 1
  connections:
    - 1
    - 4
    - 16
    - 32
    - 64
    - 128
  streamsPerConnection:
    - 16
benchmarkCompat:
  compatibleLoadShapes:
    - quic-flow-control
    - regression
    - comparison
  primaryMetrics:
    - streamsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - quic.stream.completedStreams
  - quic.stream.latencyP95
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase6
  - quic
  - flow-control
  - slow-reader
