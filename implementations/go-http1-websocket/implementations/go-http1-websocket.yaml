schemaVersion: "1.0"
id: go-http1-websocket
name: Go HTTP/1.1 Cleartext WebSocket Origin
description: Independent exact RFC 6455 origin serving deterministic ProtocolLab cleartext workloads only.
family: go-websocket
role: origin-server
targetKind: process
targetContract: process
executable: bin/linux-x64/go-http1-websocket
workingDirectory: .
baseUrl: http://127.0.0.1:18081
protocolBaseUrls: {h1: http://127.0.0.1:18081}
roles: [origin-server]
protocols: [h1]
supportedProtocols: [h1]
supportedWorkloadFamilies: [websocket]
supportedProtocolVersions: [HTTP/1.1, RFC6455]
supportedScenarios: [http1.websocket.rfc6455.cleartext.upgrade, http1.websocket.rfc6455.cleartext.control-frames, http1.websocket.rfc6455.cleartext.text-echo, http1.websocket.rfc6455.cleartext.binary-echo, http1.websocket.rfc6455.cleartext.close]
supportedTestCaseIds: [http1.websocket.rfc6455.cleartext.upgrade, http1.websocket.rfc6455.cleartext.control-frames, http1.websocket.rfc6455.cleartext.text-echo, http1.websocket.rfc6455.cleartext.binary-echo, http1.websocket.rfc6455.cleartext.close]
scenarioCoverage:
  http1.websocket.rfc6455.cleartext.upgrade: {status: supported, behavior: exact HTTP/1.1 RFC 6455 Upgrade and clean close}
  http1.websocket.rfc6455.cleartext.control-frames: {status: supported, behavior: exact masked ping and unmasked deterministic pong}
  http1.websocket.rfc6455.cleartext.text-echo: {status: supported, behavior: exact unfragmented protocol-lab UTF-8 echo}
  http1.websocket.rfc6455.cleartext.binary-echo: {status: supported, behavior: exact unfragmented repeated-octet 1 KiB echo}
  http1.websocket.rfc6455.cleartext.close: {status: supported, behavior: close code 1000 with empty UTF-8 reason}
unsupportedKnownCases: [websocket.echo, http1.websocket.rfc6455.tls.upgrade, http1.websocket.rfc6455.tls.control-frames, http1.websocket.rfc6455.tls.text-echo, http1.websocket.rfc6455.tls.binary-echo, http1.websocket.rfc6455.tls.close, http1.websocket.rfc6455.tls.subprotocol-text-echo, http1.websocket.rfc6455.tls.permessage-deflate-binary-echo, http2.websocket.rfc8441.extended-connect, http2.websocket.rfc8441.control-frames, http2.websocket.rfc8441.text-echo, http2.websocket.rfc8441.binary-echo, http2.websocket.rfc8441.close, http2.websocket.rfc8441.multi-message-text-echo, http3.websocket.rfc9220.extended-connect, http3.websocket.rfc9220.control-frames, http3.websocket.rfc9220.text-echo, http3.websocket.rfc9220.binary-echo, http3.websocket.rfc9220.close, http3.websocket.rfc9220.fragmented-binary-echo]
ports: [{name: websocket, protocol: tcp, default: 18081, hostPort: 18081, containerPort: 18081}]
environment: {PLAB_TARGET_PORT: "18081"}
startup: {port: {name: websocket, environmentVariable: PLAB_TARGET_PORT, default: 18081}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 250}
capabilities: [websocket.server, websocket.rfc6455, websocket.text-echo, websocket.binary-echo, websocket.control-frames, websocket.close]
entrypoint: {kind: process, path: bin/linux-x64/go-http1-websocket, arguments: [], workingDirectory: .}
shutdownBehavior: graceful-termination
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
notes: TLS, Extended CONNECT, extensions, subprotocols, fragmentation, WebTransport, and noncanonical payloads are rejected.
