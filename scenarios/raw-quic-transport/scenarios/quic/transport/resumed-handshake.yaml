schemaVersion: "1.0"
id: quic.transport.resumed-handshake
title: QUIC Resumed Handshake
name: QUIC Resumed Handshake
family: quic.transport
description: Validate a QUIC handshake that resumes a prior session without attempting 0-RTT early data as a transport scenario independent of HTTP/3 application semantics.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
    - quic.resumption
  protocols:
    - quic
  roles:
    - server
trafficShape: handshake-only
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicHandshake
  - quicResumption
quicTransport:
  behavior: resumed-handshake
  connectionCount: 1
  streamType: none
  streamCount: 0
  payloadDirection: none
  openPattern: sequential
  expectedBytes: 0
validation:
  required: true
  checks:
    - resumed-handshake-completes
    - session-resumption-uses-previous-state
    - zero-early-data-attempted
    - protocol:quic
  quic:
    handshakeMustComplete: true
    session:
      resumptionState: resumed
      earlyData: not-attempted
      replaySafety: not-applicable
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 0
benchmarkCompat:
  compatibleLoadShapes:
    - quic-resumption
    - smoke
    - regression
    - comparison
  primaryMetrics:
    - handshakeDurationP50
    - handshakeDurationP95
    - connectionSuccessRate
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: rtt-75ms
requiredMetrics:
  - quic.handshake.durationMs
  - quic.connection.successCount
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase6
  - quic
  - handshake
  - resumption
