schemaVersion: "1.0"
id: kestrel-http3
name: Kestrel HTTP/3
description: Lane-scoped Kestrel HTTP/3 target for ProtocolLab HTTP application scenarios.
family: kestrel
role: server
targetKind: process
targetContract: process
executable: bin/kestrel-http3
project: src/KestrelHttp3.csproj
workingDirectory: .
dockerNetworkMode: published-port
baseUrl: https://127.0.0.1:8443
protocolBaseUrls:
  h3: https://127.0.0.1:8443
certificateMode: generated-self-signed-loopback-certificate
roles:
  - server
protocols:
  - h3
supportedProtocols:
  - h3
supportedWorkloadFamilies:
  - http.application
  - http3.protocol
protocolVersions:
  - http/3
entrypoint:
  kind: process
  path: bin/kestrel-http3
  arguments: []
  workingDirectory: .
ports:
  - name: h3
    protocol: udp
    default: 8443
environment:
  PLAB_HTTP_PORT: "8443"
startup:
  port:
    name: h3
    environmentVariable: PLAB_HTTP_PORT
    default: 8443
  readiness:
    protocol: https
    path: /health
    expectedStatus: 200
readinessCheck:
  type: http
  url: /health
  timeoutSeconds: 10
capabilities:
  - http.server
  - httpStatus
  - httpBytes
  - httpHeaders
  - h3.server
  - quic.server
  - h3Protocol
  - h3Qpack
supportedProtocolVersions:
  - http/3
supportedTestCaseIds:
  - http3.core.status
  - http3.payload.bytes.1kb
  - http3.payload.bytes.64kb
  - http3.payload.bytes.1mb
  - http3.headers.response-headers-50x32
  - http3.protocol.qpack-repeated-headers
supportedScenarios:
  - http3.core.status
  - http3.payload.bytes.1kb
  - http3.payload.bytes.64kb
  - http3.payload.bytes.1mb
  - http3.headers.response-headers-50x32
  - http3.protocol.qpack-repeated-headers
scenarioCoverage:
  quic.transport.stream-throughput.1mb:
    status: unsupported
    reason: Kestrel package is HTTP/3 only; raw QUIC remains owned by quic-dotnet implementation packages.
  quic.transport.multiplex.100x64kb:
    status: unsupported
    reason: Kestrel package is HTTP/3 only; raw QUIC remains owned by quic-dotnet implementation packages.
  http3.core.status:
    status: supported
    endpoint: /status
  http3.payload.bytes.1kb:
    status: supported
    scenarioId: http3.payload.bytes.1kb
    endpoint: /bytes/1024
  http3.payload.bytes.64kb:
    status: supported
    scenarioId: http3.payload.bytes.64kb
    endpoint: /bytes/65536
  http3.payload.bytes.1mb:
    status: supported
    scenarioId: http3.payload.bytes.1mb
    endpoint: /bytes/1048576
  http3-header-heavy-qpack:
    status: supported
    scenarioId: http3.headers.response-headers-50x32
    endpoint: /headers/response?count=50&size=32
  http3.protocol.qpack-repeated-headers:
    status: supported
    scenarioId: http3.protocol.qpack-repeated-headers
    executorId: h3spec-http3-qpack
  websocket-over-h3:
    status: unsupported
    scenarioId: http3.websocket.rfc9220.extended-connect
    reason: Package does not expose WebSocket-over-H3 endpoints.
  h3spec-qpack-executor:
    status: compatible-target-unproven
    executorId: h3spec-http3-qpack
    reason: No Kestrel package-backed h3spec/QPACK proof is recorded here.
unsupportedKnownCases:
  - h1
  - h2
  - h2c
  - raw-quic
  - websocket
  - server-sent-events
endpoints:
  status:
    method: GET
    path: /status
  bytes1kb:
    method: GET
    path: /bytes/1024
  bytes64kb:
    method: GET
    path: /bytes/65536
  bytes1mb:
    method: GET
    path: /bytes/1048576
  responseHeaders50x32:
    method: GET
    path: /headers/response?count=50&size=32
shutdownBehavior: process
artifactExports:
  - kestrel-http3.log
qlogSupport: false
sslKeyLogSupport: true
notes: HTTP/3-only Kestrel lane. Do not use as a combined Kestrel HTTP/1 or HTTP/2 package.
