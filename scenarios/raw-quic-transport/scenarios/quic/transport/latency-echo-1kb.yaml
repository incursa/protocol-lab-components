schemaVersion: "1.0"
id: quic.transport.latency.echo-1kb
version: "1.0"
title: QUIC Echo Latency 1 KiB
name: QUIC Echo Latency 1 KiB
family: quic.transport
description: Validate and benchmark small bidirectional QUIC stream echo latency independently of HTTP/3.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
quicTransport:
  behavior: latency-echo
  connectionCount: 1
  streamType: bidirectional
  streamCount: 1
  payloadSizeBytes: 1024
  payloadDirection: bidirectional
  openPattern: sequential
  expectedBytes: 2048
validation:
  required: true
  checks:
    - payload-bytes-delivered
    - echoed-bytes-match-expected
    - completed-streams-match-expected
    - latency-sample-recorded
    - zero-timeouts-and-errors
    - protocol:quic
benchmark:
  warmupSeconds: 5
  durationSeconds: 15
  repetitions: 1
  connections:
    - 1
    - 4
    - 16
    - 32
    - 64
    - 128
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - quic-latency
    - smoke
    - regression
    - comparison
  primaryMetrics:
    - streamsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - quic.stream.completedStreams
  - quic.stream.latencyP50
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase6
  - quic
  - latency
