schemaVersion: "1.0"
id: go-tls13-chacha20
name: Go crypto/tls TLS 1.3 ChaCha20 Target
description: Conditional process target for the exact TLS 1.3 ChaCha20 full-handshake contract.
family: go-tls
role: library-backed-target
targetKind: process
targetContract: process
executable: bin/linux-x64/go-tls13-chacha20
workingDirectory: .
baseUrl: tls://127.0.0.1:18443
protocolBaseUrls: {tls: tls://127.0.0.1:18443}
certificateMode: plab-single-leaf-p256-server-v2
roles: [server, library-backed-target]
protocols: [tls]
supportedProtocols: [tls]
supportedProtocolVersions: [TLS1.3]
supportedWorkloadFamilies: [tls, tls.lifecycle]
supportedScenarios: [tls.handshake.full.chacha20]
supportedTestCaseIds: [tls.handshake.full.chacha20]
scenarioCoverage:
  tls.handshake.full: {status: unsupported, reason: The AES-128-GCM profile is intentionally not implemented by this narrow target.}
  tls.handshake.resumed: {status: unsupported, reason: Session resumption is disabled.}
  tls.handshake.full.tls12: {status: unsupported, reason: TLS 1.2 is disabled.}
  tls.handshake.full.chacha20: {status: supported, behavior: exact fresh TLS 1.3 ChaCha20-Poly1305 handshake}
  tls.handshake.mutual-auth: {status: unsupported, reason: Client authentication is not implemented.}
  tls.early-data.accepted: {status: unsupported, reason: Early data is disabled.}
  tls.early-data.rejected: {status: unsupported, reason: Early data is disabled.}
  tls.key-update.diagnostic: {status: unsupported, reason: KeyUpdate diagnostics are not implemented.}
  tls.record.coverage: {status: unsupported, reason: Application data is forbidden by this handshake-only target.}
  tls.record.throughput: {status: unsupported, reason: Application data is forbidden by this handshake-only target.}
unsupportedKnownCases: [tls.handshake.full, tls.handshake.resumed, tls.handshake.full.tls12, tls.handshake.mutual-auth, tls.early-data.accepted, tls.early-data.rejected, tls.key-update.diagnostic, tls.record.coverage, tls.record.throughput]
ports: [{name: tls, protocol: tcp, default: 18443}]
environment: {PLAB_LISTEN_ADDRESS: 127.0.0.1:18443}
startup: {port: {name: tls, environmentVariable: PLAB_TARGET_PORT, default: 18443}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 250}
capabilities: [tls.server, tls13, tlsX25519, tlsChaCha20Poly1305, tlsFullHandshake, scenario.tls.handshake.full.chacha20]
entrypoint: {kind: process, path: bin/linux-x64/go-tls13-chacha20, arguments: [], workingDirectory: .}
shutdownBehavior: process
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
notes: The target does not select the client offer; every completed server connection still validates exact ChaCha20 negotiation.
