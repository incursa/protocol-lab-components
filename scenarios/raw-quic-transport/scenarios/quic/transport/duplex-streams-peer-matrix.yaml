schemaVersion: "1.0"
title: QUIC Duplex Streams Peer Matrix
status: stable
kind: protocolValidation
layer: transport
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: bidirectional-stream
id: quic.transport.duplex-streams-peer-matrix
name: QUIC Duplex Streams Peer Matrix
family: quic.transport
description: Validate and benchmark matched raw QUIC peer coverage across implementations with c1, c4, c16, and c32 at five repetitions.
protocol: quic
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
  - quicDuplex
quicTransport:
  behavior: duplex-streams
  connectionCount: 1
  streamType: bidirectional
  streamCount: 16
  payloadSizeBytes: 65536
  payloadDirection: bidirectional
  openPattern: concurrent
  expectedBytes: 2097152
validation:
  required: true
  checks:
    - bidirectional-payloads-complete
benchmark:
  warmupSeconds: 1
  durationSeconds: 3
  repetitions: 5
  connections:
    - 1
    - 4
    - 16
    - 32
  streamsPerConnection:
    - 4
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - qlog
    - counters
networkProfile: clean
requiredMetrics:
  - quic.stream.bytesSent
  - quic.stream.bytesReceived
  - quic.stream.completedStreams
artifactRequirements:
  - load-tool.stdout.txt
  - load-tool.stderr.txt
  - qlog
tags:
  - phase6
  - quic
  - duplex
  - peer-matrix
