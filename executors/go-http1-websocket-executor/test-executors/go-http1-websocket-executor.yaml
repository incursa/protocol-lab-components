executorIdentity:
  id: go-http1-websocket-executor
  name: Go HTTP/1.1 Cleartext WebSocket Test Executor
  version: 0.1.0
  vendor: Incursa
versionCompatibility: {contractVersion: test-executor-v1, compatibleContractVersions: [test-executor-v1], executorVersion: 0.1.0}
claimedCapabilities:
  - {id: http1.websocket.rfc6455.cleartext.upgrade, status: supported}
  - {id: http1.websocket.rfc6455.cleartext.control-frames, status: supported}
  - {id: http1.websocket.rfc6455.cleartext.text-echo, status: supported}
  - {id: http1.websocket.rfc6455.cleartext.binary-echo, status: supported}
  - {id: http1.websocket.rfc6455.cleartext.close, status: supported}
  - {id: exact-http1.1-upgrade-proof, status: supported}
  - {id: rfc6455-client-masking-proof, status: supported}
  - {id: tls, status: unsupported}
  - {id: rfc8441, status: unsupported}
  - {id: rfc9220, status: unsupported}
  - {id: webtransport, status: unsupported}
supportedTestSelectors:
  - {selectorType: test-id, expression: http1.websocket.rfc6455.cleartext.upgrade}
  - {selectorType: test-id, expression: http1.websocket.rfc6455.cleartext.control-frames}
  - {selectorType: test-id, expression: http1.websocket.rfc6455.cleartext.text-echo}
  - {selectorType: test-id, expression: http1.websocket.rfc6455.cleartext.binary-echo}
  - {selectorType: test-id, expression: http1.websocket.rfc6455.cleartext.close}
supportedScenarioSelectors:
  - {selectorType: scenario-id, expression: http1.websocket.rfc6455.cleartext.upgrade}
  - {selectorType: scenario-id, expression: http1.websocket.rfc6455.cleartext.control-frames}
  - {selectorType: scenario-id, expression: http1.websocket.rfc6455.cleartext.text-echo}
  - {selectorType: scenario-id, expression: http1.websocket.rfc6455.cleartext.binary-echo}
  - {selectorType: scenario-id, expression: http1.websocket.rfc6455.cleartext.close}
supportedProtocolFamilies: [h1, websocket]
supportedExecutionModes: [single-cell, process]
requiredTargetEndpointBindings:
  - {bindingId: primary, purpose: websocket-endpoint, endpointType: http, protocols: [h1]}
supportedArtifactTypes:
  - {type: validation.json, producedByStates: [stopped, failed]}
  - {type: protocol-proof.json, producedByStates: [stopped, failed]}
  - {type: websocket-summary.json, producedByStates: [stopped, failed]}
  - {type: payload-hash.json, producedByStates: [stopped, failed]}
  - {type: handshake-summary.json, producedByStates: [stopped, failed]}
  - {type: frame-summary.json, producedByStates: [stopped, failed]}
  - {type: result.json, producedByStates: [stopped, failed]}
  - {type: websocket-executor-result.json, producedByStates: [stopped, failed]}
metricsAvailability: {available: true, availableKinds: [validation, connections-per-second, messages-per-second, bytes-per-second, latency-percentiles, operation-outcomes]}
parser: {id: protocol-lab-websocket-h1-json, type: protocol-lab-websocket-h1-json, preservesRawOutput: true}
telemetry:
  supported: true
  supported_contract_versions: [telemetry-bundle-v1]
  supported_scopes: [test-executor, load-generator]
  supported_artifact_kinds: [summary, metrics, stdout, stderr, raw]
  export_modes: [inline, artifact-bundle]
