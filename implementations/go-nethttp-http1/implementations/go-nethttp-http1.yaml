schemaVersion: "1.0"
id: go-nethttp-http1
name: Go net/http HTTP/1
description: Independent Go standard-library HTTP/1.1 origin for the shared ProtocolLab rows.
family: go-nethttp
role: server
targetKind: process
targetContract: process
executable: bin/linux-x64/go-nethttp-http1
workingDirectory: .
baseUrl: http://127.0.0.1:8080
dockerNetworkMode: published-port
certificateMode: none
roles: [server]
protocols: [h1]
supportedProtocols: [h1]
supportedWorkloadFamilies: [http.application]
protocolVersions: [http/1.1]
entrypoint: {kind: process, path: bin/linux-x64/go-nethttp-http1, arguments: [], workingDirectory: .}
ports:
  - {name: http, protocol: tcp, default: 8080}
environment:
  PLAB_HTTP_PORT: "8080"
startup:
  port: {name: http, environmentVariable: PLAB_HTTP_PORT, default: 8080}
  readiness: {protocol: http, path: /health, expectedStatus: 200}
readinessCheck: {type: http, url: /health, timeoutSeconds: 10}
capabilities: [http.server, httpPlaintext, httpJson]
supportedProtocolVersions: [http/1.1]
supportedTestCaseIds: [http1.core.plaintext, http1.core.json]
supportedScenarios: [http1.core.plaintext, http1.core.json]
unsupportedKnownCases: [h2, h3, https, websocket, server-sent-events]
endpoints:
  plaintext: {method: GET, path: /plaintext}
  json: {method: GET, path: /json}
shutdownBehavior: process
artifactExports: [go-nethttp-http1.log]
qlogSupport: false
sslKeyLogSupport: false
notes: HTTP/1-only Go net/http cohort member.
