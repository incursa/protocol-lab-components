schemaVersion: "1.0"
id: quiche-http3
name: quiche HTTP/3
description: Docker-backed quiche HTTP/3 client/server wrapper for ProtocolLab external peer characterization.
family: quiche
roles:
  - client
  - server
targetKind: docker
targetContract: process
protocols:
  - h3
supportedProtocols:
  - h3
supportedWorkloadFamilies:
  - http.application
supportedProtocolVersions:
  - http/3
supportedScenarios:
  - http3.core.status
  - http3.payload.bytes.64kb
  - http3.payload.bytes.1mb
supportedTestCaseIds:
  - http3.core.status
  - http3.payload.bytes.64kb
  - http3.payload.bytes.1mb
scenarioCoverage:
  raw-quic:
    status: unsupported
    reason: quiche is packaged here as an HTTP/3 peer, not a raw QUIC transport target.
  http3-1kb:
    status: partial
    scenarioId: http3.payload.bytes.1kb
    evidence: get-small external peer rows passed.
  http3-64kb:
    status: supported
    scenarioId: http3.payload.bytes.64kb
  http3-large-body:
    status: supported
    scenarioId: http3.payload.bytes.1mb
    evidence: get-large external peer rows passed for client and server paths.
  http3-header-heavy-qpack:
    status: client-only
    scenarioId: http3.headers.response-headers-50x32
    evidence: many-headers passed for quiche-client__incursa-server; server row is not wired.
  websocket-over-h3:
    status: unsupported
    reason: Package does not expose RFC9220 WebSocket-over-H3 behavior.
  h3spec-qpack-executor:
    status: compatible-target-unproven
    executorId: h3spec-http3-qpack
    reason: No quiche package-backed h3spec/QPACK target proof is recorded here.
externalPeerScenarios:
  stable:
    - get-small
    - get-empty
    - get-large
    - not-found
  clientAdditionalPass:
    - many-headers
    - split-data
  serverNotWiredInCurrentHarness:
    - many-headers
    - split-data
  blockerHistory:
    - target: incursa-client__quiche-server
      status: blocked
      scenarios:
        - get-small
        - not-found
      artifactRun: C:/src/incursa/quic-dotnet/.artifacts/http3-external/20260619T124803Z
      reason: peer server exited before client run; later focused rows passed
entrypoint:
  kind: pwsh
  path: run.ps1
  arguments: []
  workingDirectory: .
ports:
  - name: h3
    protocol: udp
    default: 4433
capabilities:
  - http.client
  - http.server
  - httpStatus
  - httpBytes
unsupportedKnownCases:
  - h1
  - h2
  - h2c
  - raw-quic
  - websocket
artifactExports:
  - command.txt
  - stdout.txt
  - stderr.txt
  - result.json
qlogSupport: true
sslKeyLogSupport: true
executionMetadata:
  manifest: protocol-lab.internal.json
