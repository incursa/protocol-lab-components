schemaVersion: "2.0"
version: 2.0.0
id: tls.handshake.full
title: TLS 1.3 Full Handshake
description: Establish a fresh authenticated TLS 1.3 session without resumption or early data.
status: draft
kind: workload
layer: transport
protocol: tls
family: tls
semanticTemplateId: tls.handshake.full
protocolStack: [tls1.3, tcp]
upstreamStandards: [https://www.rfc-editor.org/rfc/rfc9846, https://www.rfc-editor.org/rfc/rfc9525]
roles: [client, server]
requires:
  capabilities: [tls.client, tls.server, tls.handshake.full]
  protocols: [tls]
  roles: [client, server]
trafficShape: handshake-only
tls:
  profileId: plab-tls13-p256-v1
  version: tls1.3
  mode: full-handshake
  resumptionPolicy: not-offered
  earlyData: not-attempted
  serverName: tls.plab.test
  applicationDataBytes: 0
  alpn: protocol-lab-tls
  certificateProfile: plab-single-leaf-p256-v1
  cipherSuite: TLS_AES_128_GCM_SHA256
  keyExchangeGroup: x25519
  signatureScheme: ecdsa_secp256r1_sha256
  peerAuthentication: server-certificate-required
  connectionLifecycle: fresh-connection-per-operation
  measuredWindow: full-handshake
  direction: not-applicable
  prerequisitePolicy: clear-resumption-state-before-each-operation
  warmupIsolation: warmup-state-not-reused-by-measurement
executionProfile:
  transportSecurity: tls
  protocolVariant: tls1.3-full
  implementationRole: library-backed-target
  selectedComponentProofRequired: true
  executionModePolicy: record-effective-mode
  platformProvenanceRequired: true
  accelerationProvenanceRequired: true
validation:
  required: true
  checks: [protocol:tls1.3, no-fallback, handshake-complete, authenticated-peer, fresh-session, zero-unexpected-failures, zero-timeouts]
  protocol: {requested: tls1.3, expectedObserved: tls1.3, fallbackAllowed: false}
benchmarkCompat:
  compatibleLoadShapes: [smoke, diagnostic, comparison, connection-churn]
  primaryMetrics: [handshakesPerSecond, handshakeLatencyP50, handshakeLatencyP95, handshakeLatencyP99, failedOperations, timedOutOperations]
requiredMetrics: [handshakesPerSecond, handshakeLatencyMean, handshakeLatencyP50, handshakeLatencyP75, handshakeLatencyP90, handshakeLatencyP95, handshakeLatencyP99, completedOperations, failedOperations, timedOutOperations, totalTransferredBytes]
artifacts:
  required: [validation.json, protocol-proof.json, tls-negotiation.json, result.json, load.stdout.log, load.stderr.log]
  optional: [target-telemetry.json, load-generator-telemetry.json, packet-summary.json]
availability: {onUnsupported: unsupported, onUnavailable: unavailable, onBindingMismatch: validation-failed, knownUnsupported: [tls1.2-only, tls1.3-downgrade]}
networkProfile: clean
tags: [tls, tls1.3, handshake, full]
