schemaVersion: protocol-lab.load-profile.v2
version: 2.0.0
id: websocket-smoke
title: WebSocket Contract Smoke
status: experimental
purpose: smoke
description: Fast single-connection validity profile reusable across the three standardized WebSocket bindings.
durationSeconds: 5
warmupSeconds: 1
repetitions: 1
websocket: {connections: 1, concurrency: 1, totalOperations: null, operationRateLimitPerSecond: null, operationTimeoutMilliseconds: 5000}
evidence: {minimumTier: smoke, publishable: false}
artifacts: {required: [load.stdout.log, load.stderr.log, validation.json, protocol-proof.json, websocket-summary.json, result.json], optional: [frame-summary.json]}
