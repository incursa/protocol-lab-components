schemaVersion: protocol-lab.load-profile.v2
version: 2.0.0
id: dns-classic-diagnostic
title: Classic DNS Diagnostic Calibration
status: experimental
purpose: diagnostic
description: Short non-publishable single-operation-pressure profile for classic UDP, TCP, and TC-to-TCP calibration scenarios.
durationSeconds: 5
warmupSeconds: 1
repetitions: 1
dns: {connections: 1, concurrency: 1, outstandingQueries: 1, connectionReuse: reuse, connectionTimeoutMilliseconds: 5000, handshakeTimeoutMilliseconds: 5000, queryTimeoutMilliseconds: 5000, drainTimeoutMilliseconds: 5000, maxRetries: 0, totalQueries: null, queryRateLimitPerSecond: null}
evidence: {minimumTier: diagnostic, publishable: false}
artifacts: {required: [load.stdout.log, load.stderr.log, validation.json, protocol-proof.json, result.json], optional: [dns-wire-summary.json, packet-summary.json]}
