schemaVersion: "1.0"
id: gnutls-serv
name: GnuTLS gnutls-serv 3.8.9 TLS Endpoint
description: Docker source-built gnutls-serv diagnostic endpoint for the exact canonical TLS 1.3 full handshake.
family: gnutls
role: tls-diagnostic-endpoint
targetKind: docker
targetContract: process
image: incursa-protocol-lab-gnutls-serv:0.1.1
dockerfile: docker/Dockerfile
buildContext: .
dockerNetworkMode: published-port
baseUrl: tls://127.0.0.1:18462
dockerBaseUrl: tls://127.0.0.1:18462
protocolBaseUrls: {tls: tls://127.0.0.1:18462}
dockerProtocolBaseUrls: {tls: tls://127.0.0.1:18462}
certificateMode: plab-single-leaf-p256-v1
roles: [server, tls-diagnostic-endpoint]
protocols: [tls]
supportedProtocols: [tls]
supportedProtocolVersions: [TLS1.3]
supportedWorkloadFamilies: [tls, tls.lifecycle]
supportedScenarios: [tls.handshake.full]
supportedTestCaseIds: [tls.handshake.full]
scenarioCoverage:
  tls.handshake.full: {status: supported, behavior: fresh TLS 1.3 handshake with an exact GnuTLS priority string selecting AES-128-GCM-SHA256, X25519, canonical ECDSA leaf, protocol-lab-tls ALPN, fatal ALPN and SNI mismatch, tickets disabled, and no application data}
  tls.handshake.resumed: {status: unsupported, reason: The unmodified gnutls-serv CLI does not expose the exact source-session lifecycle and accepted single-use resumption policy required by the existing executor.}
  tls.handshake.full.tls12: {status: unsupported, reason: This package deliberately removes every protocol version except TLS 1.3.}
  tls.handshake.full.chacha20: {status: unsupported, reason: This package deliberately removes every cipher except AES-128-GCM.}
  tls.handshake.mutual-auth: {status: unsupported, reason: gnutls-serv can verify a client CA chain but cannot pin the canonical client leaf DER and SPKI identity required by the contract.}
  tls.early-data.accepted: {status: unsupported, reason: gnutls-serv does not implement the exact ProtocolLab early-data application effect and retry evidence contract.}
  tls.early-data.rejected: {status: unsupported, reason: gnutls-serv does not implement the exact ProtocolLab early-data rejection retry and deduplication contract.}
  tls.key-update.diagnostic: {status: unsupported, reason: gnutls-serv does not expose the exact bilateral deterministic KeyUpdate observation contract.}
  tls.record.coverage: {status: unsupported, reason: gnutls-serv does not implement the PLABTLS1 six-case direction and payload-hash command protocol used by the compatible executor.}
  tls.record.throughput: {status: unsupported, reason: gnutls-serv does not implement the PLABTLS1 deterministic 1 MiB server-to-client payload command used by the compatible executor.}
unsupportedKnownCases: [tls.handshake.resumed, tls.handshake.full.tls12, tls.handshake.full.chacha20, tls.handshake.mutual-auth, tls.early-data.accepted, tls.early-data.rejected, tls.key-update.diagnostic, tls.record.coverage, tls.record.throughput]
ports: [{name: tls, protocol: tcp, default: 18462, hostPort: 18462, containerPort: 8443}]
environment: {PLAB_SCENARIO_ID: tls.handshake.full}
startup: {port: {name: tls, environmentVariable: PLAB_TARGET_PORT, default: 18462}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 250}
capabilities: [tls.server, tls13, tlsX25519, tlsFullHandshake, scenario.tls.handshake.full]
comparisonCohort: tls-endpoint-tool
rankingEligibility: diagnostic-only
entrypoint: {kind: bash, path: run.sh, arguments: [], workingDirectory: .}
shutdownBehavior: docker-container
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
executionMetadata: {manifest: protocol-lab.internal.json}
notes: This package source-builds the unmodified upstream diagnostic tool in its Docker target and is not an application-server or production-origin implementation.
