schemaVersion: "1.0"
id: openssl-tls13-key-update
name: OpenSSL TLS 1.3 KeyUpdate Target
description: Independent OpenSSL process target for the exact TLS 1.3 KeyUpdate diagnostic.
family: openssl-tls
role: library-backed-target
targetKind: process
targetContract: process
executable: bin/linux-x64/openssl-tls13-key-update
workingDirectory: .
baseUrl: tls://127.0.0.1:18460
protocolBaseUrls: {tls: tls://127.0.0.1:18460}
certificateMode: plab-single-leaf-p256-server-v2
roles: [server, library-backed-target]
protocols: [tls]
supportedProtocols: [tls]
supportedProtocolVersions: [TLS1.3]
supportedWorkloadFamilies: [tls, tls.lifecycle, tls.key-update]
supportedScenarios: [tls.key-update.diagnostic]
supportedTestCaseIds: [tls.key-update.diagnostic]
scenarioCoverage:
  tls.handshake.full: {status: unsupported, reason: Full-handshake timing is outside this KeyUpdate-only target.}
  tls.handshake.resumed: {status: unsupported, reason: Resumption is disabled for the KeyUpdate diagnostic.}
  tls.handshake.full.tls12: {status: unsupported, reason: TLS 1.2 is disabled.}
  tls.handshake.full.chacha20: {status: unsupported, reason: Only TLS_AES_128_GCM_SHA256 is enabled.}
  tls.handshake.mutual-auth: {status: unsupported, reason: Client certificates are not part of this profile.}
  tls.early-data.accepted: {status: unsupported, reason: Early data is disabled.}
  tls.early-data.rejected: {status: unsupported, reason: Early data is disabled.}
  tls.key-update.diagnostic: {status: supported, behavior: one client-initiated update_not_requested KeyUpdate with exact bilateral deterministic post-update transfer}
  tls.record.coverage: {status: unsupported, reason: Record-boundary diagnostics are not implemented.}
  tls.record.throughput: {status: unsupported, reason: Sustained record throughput is not implemented.}
unsupportedKnownCases: [tls.handshake.full, tls.handshake.resumed, tls.handshake.full.tls12, tls.handshake.full.chacha20, tls.handshake.mutual-auth, tls.early-data.accepted, tls.early-data.rejected, tls.record.coverage, tls.record.throughput]
ports: [{name: tls, protocol: tcp, default: 18460}]
environment: {PLAB_LISTEN_ADDRESS: 127.0.0.1:18460, PLAB_SCENARIO_ID: tls.key-update.diagnostic}
startup: {port: {name: tls, environmentVariable: PLAB_TARGET_PORT, default: 18460}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 250}
capabilities: [tls.server, tls13, tlsX25519, tlsKeyUpdateObservation, scenario.tls.key-update.diagnostic]
entrypoint: {kind: process, path: bin/linux-x64/openssl-tls13-key-update, arguments: [], workingDirectory: .}
shutdownBehavior: process
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
notes: The target records KeyUpdate generation transitions and message counts without enabling key logging or publishing traffic-secret material.
