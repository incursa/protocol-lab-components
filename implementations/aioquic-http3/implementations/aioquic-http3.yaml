schemaVersion: "1.0"
id: aioquic-http3
name: aioquic HTTP/3
description: Docker-backed aioquic HTTP/3 client/server wrapper for ProtocolLab external peer characterization.
family: aioquic
roles:
  - server
implementationRole: origin-server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-aioquic-http3:0.3.1
dockerfile: docker/aioquic.Dockerfile
buildContext: .
dockerNetworkMode: published-port
baseUrl: https://localhost:4433
dockerBaseUrl: https://localhost:4433
protocolBaseUrls:
  h3: https://localhost:4433
dockerProtocolBaseUrls:
  h3: https://localhost:4433
certificateMode: package-local-authenticated-websocket-plab-test-certificate
protocols:
  - h3
  - websocket
supportedProtocols:
  - h3
  - websocket
supportedWorkloadFamilies:
  - http.application
  - websocket
supportedProtocolVersions:
  - http/3
supportedScenarios:
  - http3.core.status
  - http3.payload.bytes.1kb
  - http3.headers.response-headers-50x32
  - http3.protocol.qpack-repeated-headers
  - http3.websocket.rfc9220.extended-connect
  - http3.websocket.rfc9220.control-frames
  - http3.websocket.rfc9220.text-echo
  - http3.websocket.rfc9220.binary-echo
  - http3.websocket.rfc9220.close
  - http3.websocket.rfc9220.fragmented-binary-echo
supportedTestCaseIds:
  - http3.core.status
  - http3.payload.bytes.1kb
  - http3.headers.response-headers-50x32
  - http3.protocol.qpack-repeated-headers
  - http3.websocket.rfc9220.extended-connect
  - http3.websocket.rfc9220.control-frames
  - http3.websocket.rfc9220.text-echo
  - http3.websocket.rfc9220.binary-echo
  - http3.websocket.rfc9220.close
  - http3.websocket.rfc9220.fragmented-binary-echo
scenarioCoverage:
  quic.transport.stream-throughput.1mb:
    status: unsupported
    reason: aioquic is packaged here as an HTTP/3 peer, not a raw QUIC transport target.
  quic.transport.multiplex.100x64kb:
    status: unsupported
    reason: aioquic is packaged here as an HTTP/3 peer, not a raw QUIC transport target.
  http3.core.status:
    status: supported
    endpoint: /status
  http3.payload.bytes.1kb:
    status: supported
    scenarioId: http3.payload.bytes.1kb
    evidence: get-small external peer rows passed for client and server roles.
  http3.payload.bytes.64kb:
    status: unproven
    scenarioId: http3.payload.bytes.64kb
    reason: No package-backed 64KB row is promoted for aioquic 1.3.0.
  http3.payload.bytes.1mb:
    status: unsupported
    scenarioId: http3.payload.bytes.1mb
    reason: aioquic 1.3.0 large-body response completion stalls were observed.
  http3-header-heavy-qpack:
    status: supported
    scenarioId: http3.protocol.qpack-repeated-headers
    note: Package advertises QPACK repeated-header scenario metadata; live package-backed proof remains separate from support metadata.
  websocket-over-h3:
    status: supported
    scenarioId: http3.websocket.rfc9220.extended-connect
    executorId: aioquic-rfc9220-websocket
    reason: The aioquic HTTP/3 package exposes the /websocket-proof RFC9220 proof endpoint and uses the aioquic RFC9220 executor for validation.
  http3.websocket.rfc9220.fragmented-binary-echo:
    status: supported
    scenarioId: http3.websocket.rfc9220.fragmented-binary-echo
    executorId: aioquic-rfc9220-websocket
    reason: The target reassembles the exact masked 1024, 2048, and 2928 byte frame plan without interleaved control frames and echoes the deterministic 6000-byte message.
  h3spec-qpack-executor:
    status: compatible-target-unproven
    executorId: h3spec-http3-qpack
    reason: No aioquic package-backed h3spec/QPACK target proof is recorded here.
externalPeerScenarios:
  stable:
    - get-small
    - not-found
  documentedSkips:
    - get-large
  notPromotedWithoutLiveProof:
    - get-empty
    - many-headers
    - split-data
  evidence:
    - target: aioquic-client__incursa-server
      status: pass
      scenarios:
        - get-small
        - not-found
      artifactRun: C:/src/incursa/quic-dotnet/.artifacts/http3-external/20260619T055801Z
    - target: incursa-client__aioquic-server
      status: pass
      scenarios:
        - get-small
        - not-found
      artifactRun: C:/src/incursa/quic-dotnet/.artifacts/http3-external/20260619T055801Z
    - target: aioquic-client__incursa-server
      status: skipped
      scenarios:
        - get-large
      reason: aioquic 1.3.0 large-body peer incompatibility
entrypoint:
  kind: pwsh
  path: run.ps1
  arguments: []
  workingDirectory: .
ports:
  - name: h3
    protocol: udp
    default: 4433
    hostPort: 4433
    containerPort: 4433
dockerCommandArguments:
  - /usr/local/bin/aioquic-http3-server
  - /www
  - /certs/cert.pem
  - /certs/priv.key
  - "4433"
startup:
  port:
    name: h3
    default: 4433
readinessCheck:
  type: processStarted
  timeoutSeconds: 30
capabilities:
  - h3.server
  - quic.server
  - http.client
  - http.server
  - httpStatus
  - httpBytes
  - httpHeaders
  - h3Protocol
  - h3Qpack
  - websocket.server
  - rfc9220WebSocket
  - websocket.fragmentation
endpoints:
  bytes1kb:
    method: GET
    path: /bytes/1024
unsupportedKnownCases:
  - h1
  - h2
  - h2c
  - raw-quic
artifactExports:
  - command.txt
  - stdout.txt
  - stderr.txt
  - result.json
qlogSupport: true
sslKeyLogSupport: true
executionMetadata:
  manifest: protocol-lab.internal.json
notes: Package public metadata intentionally omits Docker command lines; runtime details live in protocol-lab.internal.json.
