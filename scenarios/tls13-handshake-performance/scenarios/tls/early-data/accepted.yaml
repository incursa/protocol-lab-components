schemaVersion: "2.0"
version: 2.0.0
id: tls.early-data.accepted
title: TLS 1.3 Accepted 0-RTT
description: Send one replay-safe deterministic request as TLS 1.3 early data and require explicit acceptance.
status: experimental
kind: protocolValidation
layer: transport
protocol: tls
family: tls
semanticTemplateId: tls.early-data.replay-safe.1kib
protocolStack: [tls1.3, tcp]
upstreamStandards: [https://www.rfc-editor.org/rfc/rfc9846]
roles: [client, server]
requires: {capabilities: [tls.client, tls.server, tls.resumption, tls.early-data], protocols: [tls], roles: [client, server]}
trafficShape: request-response
tls:
  profileId: plab-tls13-aes128gcm-p256-server-auth-v2
  version: tls1.3
  mode: early-data
  resumptionPolicy: accepted-psk-single-use-ticket
  earlyData: accepted
  earlyDataReplayPolicy: replay-safe-idempotent-fixture-only
  serverName: tls.plab.test
  applicationDataBytes: 1024
  payloadGenerator: repeated-octet
  payloadOctet: 90
  payloadSha256: e8fb68ce4d4d002dba40c0a459d96807c96ded1c2fdefae3f56f8a0c06a4fecf
  alpn: protocol-lab-tls
  certificateProfile: plab-single-leaf-p256-server-v2
  cipherSuite: TLS_AES_128_GCM_SHA256
  keyExchangeGroup: x25519
  signatureScheme: ecdsa_secp256r1_sha256
  peerAuthentication: server-certificate-required
  connectionLifecycle: resumed-connection-per-operation
  measuredWindow: early-data-and-resumed-handshake
  direction: client-to-server
  prerequisitePolicy: unmeasured-source-session-and-single-use-ticket
  warmupIsolation: warmup-tickets-not-reused-by-measurement
executionProfile: {transportSecurity: tls, protocolVariant: tls1.3-zero-rtt-accepted, implementationRole: library-backed-target, selectedComponentProofRequired: true, executionModePolicy: record-effective-mode, platformProvenanceRequired: true, accelerationProvenanceRequired: true}
validation: {required: true, checks: [protocol:tls1.3, resumed-session-accepted, early-data-offered, early-data-accepted, replay-safe-fixture, payload-sha256, zero-unexpected-failures, zero-timeouts], protocol: {requested: tls1.3-zero-rtt, expectedObserved: tls1.3-zero-rtt-accepted, fallbackAllowed: false}}
benchmarkCompat: {compatibleLoadShapes: [smoke, diagnostic], primaryMetrics: [handshakeLatencyP95, completedOperations, failedOperations, timedOutOperations]}
requiredMetrics: [handshakeLatencyMean, handshakeLatencyP50, handshakeLatencyP95, handshakeLatencyP99, completedOperations, failedOperations, timedOutOperations, totalTransferredBytes]
artifacts: {required: [validation.json, protocol-proof.json, tls-negotiation.json, resumption-proof.json, early-data-proof.json, payload-hash.json, result.json, load.stdout.log, load.stderr.log], optional: [packet-summary.json]}
availability: {onUnsupported: unsupported, onUnavailable: unavailable, onBindingMismatch: validation-failed, knownUnsupported: [early-data-disabled, replay-safe-fixture-unavailable]}
networkProfile: clean
tags: [tls, tls1.3, zero-rtt, accepted]
