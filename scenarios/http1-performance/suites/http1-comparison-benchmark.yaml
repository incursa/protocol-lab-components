id: http1-comparison-benchmark
name: ProtocolLab HTTP/1 comparison benchmark suite
description: Profile-specific HTTP/1 application selector for the comparison load profile.
purpose: benchmark
resultKind: benchmark
loadProfileId: http1-comparison
scenarios:
  - http1.core.plaintext
  - http1.core.json
  - http1.payload.bytes.1kb
protocol: h1
defaults:
  durationSeconds: 30
  warmupSeconds: 10
  repetitions: 3
  connections: 128
  streamsPerConnection: 100
counterCapture:
  enabledByDefault: false
  tool: ""
notes: This suite selects existing public HTTP/1 scenarios with the protocol-specific http1-comparison load profile; it does not imply a required runner or load generator.
tags:
  - http1
  - comparison
  - benchmark
