schemaVersion: "1.0"
title: QUIC Cold Handshake
status: stable
kind: protocolValidation
layer: transport
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: handshake-only
id: quic.transport.cold-handshake
name: QUIC Cold Handshake
family: quic.transport
description: Validate and benchmark a fresh QUIC handshake without resumption state or application stream traffic.
protocol: quic
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicHandshake
quicTransport:
  behavior: cold-handshake
  connectionCount: 1
  streamType: bidirectional
  streamCount: 0
  payloadSizeBytes: 0
  payloadDirection: client-to-server
  openPattern: sequential
  expectedBytes: 0
validation:
  required: true
  checks:
    - unsupported-until-quic-validator
    - handshake-completes
benchmark:
  warmupSeconds: 2
  durationSeconds: 10
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 0
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - connectTimeMeanMs
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - qlog
    - counters
networkProfile: clean
requiredMetrics:
  - quic.connection.handshakesCompleted
artifactRequirements:
  - load-tool.stdout.txt
  - load-tool.stderr.txt
tags:
  - quic
  - handshake
  - cold-start
