schemaVersion: "2.0"
version: 2.0.0
id: tls.handshake.resumed
title: TLS 1.3 Resumed Handshake
description: Establish a TLS 1.3 session using accepted PSK resumption derived from a proven source session, without early data.
status: draft
kind: workload
layer: transport
protocol: tls
family: tls
semanticTemplateId: tls.handshake.resumed
protocolStack: [tls1.3, tcp]
upstreamStandards: [https://www.rfc-editor.org/rfc/rfc9846]
roles: [client, server]
requires:
  capabilities: [tls.client, tls.server, tls.handshake.resumed]
  protocols: [tls]
  roles: [client, server]
trafficShape: handshake-only
tls:
  profileId: plab-tls13-p256-v1
  version: tls1.3
  mode: resumed-handshake
  resumptionPolicy: accepted-psk-single-use-ticket
  earlyData: not-attempted
  serverName: tls.plab.test
  applicationDataBytes: 0
  alpn: protocol-lab-tls
  certificateProfile: plab-single-leaf-p256-v1
  cipherSuite: TLS_AES_128_GCM_SHA256
  keyExchangeGroup: x25519
  signatureScheme: ecdsa_secp256r1_sha256
  peerAuthentication: server-certificate-required
  connectionLifecycle: resumed-connection-per-operation
  measuredWindow: resumed-handshake
  direction: not-applicable
  prerequisitePolicy: unmeasured-source-session-per-measured-operation
  warmupIsolation: warmup-state-not-reused-by-measurement
executionProfile: {transportSecurity: tls, protocolVariant: tls1.3-psk-resumed, implementationRole: library-backed-target, selectedComponentProofRequired: true, executionModePolicy: record-effective-mode, platformProvenanceRequired: true, accelerationProvenanceRequired: true}
validation:
  required: true
  checks: [protocol:tls1.3, no-fallback, handshake-complete, resumed-session-accepted, source-session-provenance, early-data-not-attempted, zero-unexpected-failures, zero-timeouts]
  protocol: {requested: tls1.3-resumed, expectedObserved: tls1.3-resumed, fallbackAllowed: false}
benchmarkCompat:
  compatibleLoadShapes: [smoke, diagnostic, comparison, connection-churn]
  primaryMetrics: [handshakesPerSecond, handshakeLatencyP50, handshakeLatencyP95, handshakeLatencyP99, failedOperations, timedOutOperations]
requiredMetrics: [handshakesPerSecond, handshakeLatencyMean, handshakeLatencyP50, handshakeLatencyP75, handshakeLatencyP90, handshakeLatencyP95, handshakeLatencyP99, completedOperations, failedOperations, timedOutOperations]
artifacts:
  required: [validation.json, protocol-proof.json, tls-negotiation.json, resumption-proof.json, result.json, load.stdout.log, load.stderr.log]
  optional: [target-telemetry.json, load-generator-telemetry.json]
availability: {onUnsupported: unsupported, onUnavailable: unavailable, onBindingMismatch: validation-failed, knownUnsupported: [session-resumption-disabled, resumption-rejected, zero-rtt-substitution]}
networkProfile: clean
tags: [tls, tls1.3, handshake, resumption]
