  hedgingPolicy: disabled
  waitForReady: false
  effectiveHttp2SettingsRequired: true
  byteAccounting: {hashScope: per-message, grpcFrameIncludesPrefix: true, totalTransferredBytesScope: bidirectional-on-wire-transport-bytes-including-protocol-overhead}
  messageFraming: {compressedFlag: 0, lengthPrefixBytes: 4, byteOrder: network, lengthValueSource: serializedProtobufBytes, dataFrameBoundariesDefineMessageBoundaries: false}
  request: {count: 1, payloadGenerator: repeated-octet, payloadOctet: 71, payloadBytes: 128, payloadSha256: 394394b5f0e91a21d1e932f9ed55e098c8b05f3668f77134eeee843fef1d1758, serializedProtobufBytes: 131, serializedProtobufSha256: c2046bce7238a2a9cae159ba85a75e93f07c74073fe7b83d2be713caef717cb4, grpcFrameBytes: 136, grpcFrameSha256: 98f1fce70c79cf7da3649fc3ecfc77a975c1427c9f8afcd1a41d85559164525a}
  response: {count: 0}
executionProfile: {transportSecurity: tls, protocolVariant: grpc-over-h2-tls-alpn, implementationRole: origin-server, selectedComponentProofRequired: true, executionModePolicy: record-effective-mode}
