schemaVersion: "1.0"
id: grpc-cpp
name: gRPC C++ Target
description: Minimal native gRPC C++ adapter for the canonical ProtocolLab protobuf service.
family: grpc-cpp
role: server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-grpc-cpp:0.1.0
dockerfile: docker/Dockerfile
buildContext: .
dockerNetworkMode: published-port
baseUrl: https://127.0.0.1:18444
dockerBaseUrl: https://127.0.0.1:18444
protocolBaseUrls: {h2: https://127.0.0.1:18444}
dockerProtocolBaseUrls: {h2: https://127.0.0.1:18444}
certificateMode: package-test-root
roles: [server]
protocols: [h2]
supportedProtocols: [h2]
supportedProtocolVersions: [HTTP/2.0]
supportedWorkloadFamilies: [grpc]
supportedScenarios: &scenarios [grpc.h2.deadline-exceeded, grpc.h2.client-cancellation]
supportedTestCaseIds: *scenarios
scenarioCoverage:
  grpc.h2.unary.echo: {status: unsupported, reason: gRPC C++ emits application/grpc while the current executor requires application/grpc+proto}
  grpc.h2.unary.empty: {status: unsupported, reason: blocked by exact response content-type gate}
  grpc.h2.unary.fixed-metadata: {status: unsupported, reason: blocked by exact response content-type gate}
  grpc.h2.unary.gzip: {status: unsupported, reason: blocked by exact response content-type gate}
  grpc.h2.unary.large: {status: unsupported, reason: blocked by exact response content-type gate}
  grpc.h2.server-streaming.echo: {status: unsupported, reason: blocked by exact response content-type gate}
  grpc.h2.client-streaming.echo: {status: unsupported, reason: blocked by exact response content-type gate}
  grpc.h2.bidi-streaming.echo: {status: unsupported, reason: blocked by exact response content-type gate}
  grpc.h2.trailers-only-status: {status: unsupported, reason: framework percent-encodes grpc-message while the executor requires the literal value}
  grpc.h2.deadline-exceeded: {status: supported, behavior: response withheld beyond deadline}
  grpc.h2.client-cancellation: {status: supported, behavior: explicit initial metadata then cancellation}
  grpc.h2.unary.echo-new-channel: {status: unsupported, reason: blocked by exact response content-type gate}
unsupportedKnownCases: [grpc-web, grpc-over-h3, h1, h2c, retries, hedging]
ports: [{name: grpc-h2, protocol: tcp, default: 18444, hostPort: 18444, containerPort: 18444}]
environment: {PLAB_TARGET_PORT: "18444"}
startup: {port: {name: grpc-h2, environmentVariable: PLAB_TARGET_PORT, default: 18444}, readiness: {protocol: process, timeoutSeconds: 60}}
readinessCheck: {type: processStarted, timeoutSeconds: 60, startupDelayMilliseconds: 1500}
capabilities: [grpc.h2, grpc.terminal-outcomes, tls13, alpn.h2]
entrypoint: {kind: pwsh, path: run.ps1, arguments: [], workingDirectory: .}
shutdownBehavior: process
artifactExports: [command.txt, stdout.txt, stderr.txt, result.json]
qlogSupport: false
sslKeyLogSupport: false
notes: Deadline and client-cancellation rows pass the exact executor. Other implemented service methods remain unclaimed because standard gRPC C++ response metadata differs from the current executor contract.
