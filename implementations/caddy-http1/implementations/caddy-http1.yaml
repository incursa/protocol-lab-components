schemaVersion: "1.0"
id: caddy-http1
name: Caddy HTTP/1
description: Lane-scoped Caddy HTTP/1.1 target built from the official Caddy image pinned by OCI digest.
family: caddy
role: server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-caddy-http1:0.1.1
dockerfile: Dockerfile
buildContext: .
baseUrl: http://127.0.0.1:8080
dockerBaseUrl: http://127.0.0.1:8080
protocolBaseUrls:
  h1: http://127.0.0.1:8080
dockerProtocolBaseUrls:
  h1: http://127.0.0.1:8080
dockerNetworkMode: published-port
certificateMode: none
roles:
  - server
protocols:
  - h1
supportedProtocols:
  - h1
supportedWorkloadFamilies:
  - http.application
protocolVersions:
  - http/1.1
entrypoint:
  kind: pwsh
  path: run.ps1
  arguments: []
  workingDirectory: .
ports:
  - name: http
    protocol: tcp
    default: 8080
    hostPort: 8080
    containerPort: 8080
environment:
  PLAB_HTTP_PORT: "8080"
startup:
  port:
    name: http
    environmentVariable: PLAB_HTTP_PORT
    default: 8080
  readiness:
    protocol: http
    path: /health
    expectedStatus: 200
readinessCheck:
  type: http
  url: /health
  timeoutSeconds: 20
capabilities:
  - http.server
  - httpPlaintext
  - httpJson
supportedProtocolVersions:
  - http/1.1
supportedTestCaseIds:
  - http1.core.plaintext
  - http1.core.json
supportedScenarios:
  - http1.core.plaintext
  - http1.core.json
unsupportedKnownCases:
  - h2
  - h3
  - https
  - request-body-echo
  - server-sent-events
requiredExternalTools:
  - docker
runtime:
  upstreamProgram: Caddy
  upstreamProgramModified: false
  imageReference: caddy@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
  caddyVersion: 2.11.2
endpoints:
  plaintext:
    method: GET
    path: /plaintext
  json:
    method: GET
    path: /json
shutdownBehavior: runner-owned-docker-container
artifactExports:
  - caddy-http1.log
qlogSupport: false
sslKeyLogSupport: false
notes: HTTP/1-only Caddy lane. Do not use as a Caddy HTTP/2 or HTTP/3 package.
