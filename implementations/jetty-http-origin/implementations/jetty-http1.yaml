schemaVersion: "1.0"
id: jetty-http1
name: Eclipse Jetty HTTP/1
description: Independent Jetty HTTP/1.1 origin built in the digest-pinned official Jetty image.
family: jetty
role: server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-jetty-http-origin:0.1.0
dockerfile: Dockerfile
buildContext: .
baseUrl: http://127.0.0.1:8080
dockerBaseUrl: http://127.0.0.1:8080
protocolBaseUrls: {h1: http://127.0.0.1:8080}
dockerProtocolBaseUrls: {h1: http://127.0.0.1:8080}
dockerNetworkMode: published-port
certificateMode: none
roles: [server]
protocols: [h1]
supportedProtocols: [h1]
supportedWorkloadFamilies: [http.application]
protocolVersions: [http/1.1]
ports:
  - {name: http, protocol: tcp, default: 8080, hostPort: 8080, containerPort: 8080}
environment: {PLAB_HTTP_PORT: "8080"}
readinessCheck: {type: http, url: /health, timeoutSeconds: 180}
capabilities: [http.server, httpPlaintext, httpJson]
supportedProtocolVersions: [http/1.1]
supportedTestCaseIds: [http1.core.plaintext, http1.core.json]
supportedScenarios: [http1.core.plaintext, http1.core.json]
unsupportedKnownCases: [h2-evidence-cohort, h3, https, websocket, server-sent-events]
requiredExternalTools: [docker]
runtime:
  upstreamProgram: Eclipse Jetty
  upstreamProgramModified: false
  jettyVersion: 12.0.37
  imageReference: jetty@sha256:542f79d7aaa27dd2c6f9092a36be4b5b443e9fd7efc7d43c673a959caafa0f53
endpoints:
  plaintext: {method: GET, path: /plaintext}
  json: {method: GET, path: /json}
shutdownBehavior: runner-owned-docker-container
artifactExports: [jetty-http1.log]
qlogSupport: false
sslKeyLogSupport: false
notes: HTTP/1 Jetty cohort member; h2c evidence is selected through a separate implementation manifest.
