schemaVersion: "1.0"
id: websocat-http1-websocket
name: websocat HTTP/1.1 WebSocket Diagnostic Origin
description: Upstream websocat mirror server wrapped as a diagnostic RFC 6455 baseline.
family: websocat
role: origin-server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-websocat-http1-websocket:0.1.1
dockerfile: docker/Websocat.Dockerfile
buildContext: docker
dockerNetworkMode: published-port
baseUrl: http://127.0.0.1:18082
dockerBaseUrl: http://127.0.0.1:18082
protocolBaseUrls: {h1: http://127.0.0.1:18082}
dockerProtocolBaseUrls: {h1: http://127.0.0.1:18082}
roles: [origin-server]
protocols: [h1]
supportedProtocols: [h1]
supportedWorkloadFamilies: [websocket]
supportedProtocolVersions: [HTTP/1.1, RFC6455]
supportedScenarios: [http1.websocket.rfc6455.cleartext.upgrade, http1.websocket.rfc6455.cleartext.control-frames, http1.websocket.rfc6455.cleartext.text-echo, http1.websocket.rfc6455.cleartext.close]
supportedTestCaseIds: [http1.websocket.rfc6455.cleartext.upgrade, http1.websocket.rfc6455.cleartext.control-frames, http1.websocket.rfc6455.cleartext.text-echo, http1.websocket.rfc6455.cleartext.close]
scenarioCoverage:
  http1.websocket.rfc6455.cleartext.upgrade: {status: supported, executorId: go-http1-websocket-executor, endpoint: /websocket}
  http1.websocket.rfc6455.cleartext.control-frames: {status: supported, executorId: go-http1-websocket-executor, endpoint: /websocket}
  http1.websocket.rfc6455.cleartext.text-echo: {status: supported, executorId: go-http1-websocket-executor, endpoint: /websocket}
  http1.websocket.rfc6455.cleartext.binary-echo: {status: unsupported, reason: websocat mirror does not preserve the binary frame opcode required by the exact mixed text and binary contract}
  http1.websocket.rfc6455.cleartext.close: {status: supported, executorId: go-http1-websocket-executor, endpoint: /websocket}
unsupportedKnownCases: [websocket.echo, http1.websocket.rfc6455.cleartext.binary-echo, http1.websocket.rfc6455.tls.upgrade, http1.websocket.rfc6455.tls.control-frames, http1.websocket.rfc6455.tls.text-echo, http1.websocket.rfc6455.tls.binary-echo, http1.websocket.rfc6455.tls.close, http1.websocket.rfc6455.tls.subprotocol-text-echo, http1.websocket.rfc6455.tls.permessage-deflate-binary-echo, http2.websocket.rfc8441.extended-connect, http2.websocket.rfc8441.control-frames, http2.websocket.rfc8441.text-echo, http2.websocket.rfc8441.binary-echo, http2.websocket.rfc8441.close, http2.websocket.rfc8441.multi-message-text-echo, http3.websocket.rfc9220.extended-connect, http3.websocket.rfc9220.control-frames, http3.websocket.rfc9220.text-echo, http3.websocket.rfc9220.binary-echo, http3.websocket.rfc9220.close, http3.websocket.rfc9220.fragmented-binary-echo]
ports: [{name: websocket, protocol: tcp, default: 18082, hostPort: 18082, containerPort: 18081}]
environment: {PLAB_TARGET_PORT: "18082"}
startup: {port: {name: websocket, environmentVariable: PLAB_TARGET_PORT, default: 18082}, readiness: {protocol: process, timeoutSeconds: 30}}
readinessCheck: {type: processStarted, timeoutSeconds: 30, startupDelayMilliseconds: 500}
capabilities: [scenario.http1.websocket.rfc6455.cleartext.upgrade, scenario.http1.websocket.rfc6455.cleartext.control-frames, scenario.http1.websocket.rfc6455.cleartext.text-echo, scenario.http1.websocket.rfc6455.cleartext.close, websocket.server, websocket.rfc6455, websocket.text-echo, websocket.control-frames, websocket.close]
entrypoint: {kind: pwsh, path: run.ps1, arguments: [], workingDirectory: .}
shutdownBehavior: process
artifactExports: [command.txt, version.txt, stdout.txt, stderr.txt, result.json]
qlogSupport: false
sslKeyLogSupport: false
notes: Diagnostic-only baseline excluded from primary performance rankings; websocat does not preserve the exact binary frame opcode in mirror mode, documents backpressure and socket-lifecycle limitations, and has no RFC 8441 or RFC 9220 support.
