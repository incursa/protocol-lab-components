schemaVersion: "1.0"
id: quic.transport.zero-rtt-accepted
title: QUIC Zero-RTT Accepted
name: QUIC Zero-RTT Accepted
family: quic.transport
description: Validate accepted QUIC zero-RTT early data on a resumed session using replay-safe application traffic.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
    - quic.resumption
    - quic.zero-rtt
  protocols:
    - quic
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicHandshake
  - quicResumption
  - quicZeroRtt
quicTransport:
  behavior: zero-rtt-accepted
  connectionCount: 1
  streamType: bidirectional
  streamCount: 1
  payloadSizeBytes: 1024
  payloadDirection: client-to-server
  openPattern: sequential
  expectedBytes: 1024
validation:
  required: true
  checks:
    - zero-rtt-accepted
    - early-data-bytes-delivered
    - resumed-session-completes
    - replay-safe-traffic
    - protocol:quic
  quic:
    handshakeMustComplete: true
    session:
      resumptionState: resumed
      earlyData: accepted
      replaySafety: replay-safe
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - quic-zero-rtt
    - smoke
    - regression
    - comparison
  primaryMetrics:
    - handshakeDurationP50
    - handshakeDurationP95
    - connectionSuccessRate
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: bandwidth-10mbps
requiredMetrics:
  - quic.handshake.durationMs
  - quic.connection.successCount
  - quic.stream.bytesSent
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase6
  - quic
  - handshake
  - resumption
  - zero-rtt
  - replay-safe
