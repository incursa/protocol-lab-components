name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate component manifests
        shell: pwsh
        run: ./scripts/package/Validate-ProtocolLabComponentManifests.ps1

  component-aware-selection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x

      - name: Resolve changed paths
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $paths = @(git diff --name-only 'origin/${{ github.base_ref }}...HEAD')
          }
          elseif ('${{ github.event_name }}' -eq 'push') {
            $paths = @(git diff --name-only '${{ github.event.before }}' '${{ github.sha }}')
          }
          else { $paths = @() }
          $paths | Set-Content -LiteralPath .component-release-changed-paths.txt -Encoding utf8NoBOM

      - name: Validate and build graph-selected components (dry-run release)
        shell: pwsh
        run: |
          $paths = @(Get-Content -LiteralPath .component-release-changed-paths.txt -ErrorAction SilentlyContinue | Where-Object { $_ })
          ./scripts/package/Invoke-ProtocolLabComponentSelectedBuilds.ps1 -ChangedPath $paths

      - name: Record component selection
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath artifacts/packages -File -Filter '*.plabpkg' -ErrorAction SilentlyContinue | Select-Object FullName, Length
