scenarioCoverage:
  quic.transport.stream-throughput.64kb:
    status: supported
  quic.transport.stream-throughput.1mb:
    status: supported
  quic.transport.stream-download.1mb:
    status: supported
    behavior: exact deterministic 1MiB server-to-client payload validation
  quic.transport.stream-throughput.16mb:
    status: supported
  quic.transport.sustained-stream.256x64kb:
    status: supported
    behavior: exactly 256 sequential 64KiB writes on one long-lived stream
  quic.transport.sustained-download.256x64kb:
    status: supported
    behavior: exact deterministic 16MiB server-to-client payload delivered as 256 sequential 64KiB writes
  quic.transport.latency.echo-1kb:
    status: supported
  quic.transport.multiplex.100x1kb:
    status: supported
  quic.transport.multiplex.100x64kb:
    status: supported
  quic.transport.multiplex.16x1mb:
    status: supported
  quic.transport.stream-limits.100x64kb:
    status: supported
  quic.transport.flow-control.slow-reader-16x64kb:
    status: supported
  quic.transport.payload.large-1mb:
    status: supported
  quic.transport.handshake-cold:
    status: supported
  quic.transport.connection-churn:
    status: supported
  quic.transport.stream-churn:
    status: supported
  quic.transport.duplex-streams:
    status: supported
  quic.transport.duplex-streams.16x1mb:
    status: supported
  quic.transport.duplex-streams-peer-matrix:
    status: supported
  http3.payload.bytes.1kb:
    status: unsupported
    reason: Raw QUIC executor does not drive HTTP/3 application requests.
  http3.payload.bytes.64kb:
    status: unsupported
    reason: Raw QUIC executor does not drive HTTP/3 application requests.
  http3.payload.bytes.1mb:
    status: unsupported
    reason: Raw QUIC executor does not drive HTTP/3 application requests.
  http3-header-heavy-qpack:
    status: unsupported
    reason: Raw QUIC executor does not drive HTTP/3 header or QPACK behavior.
  websocket-over-h3:
    status: unsupported
    reason: Raw QUIC executor does not implement RFC9220 WebSocket-over-H3.
  h3spec-qpack-executor:
    status: unsupported
    reason: h3spec/QPACK is a separate HTTP/3 test-executor package.
supportedProtocolFamilies:
  - quic
supportedExecutionModes:
  - single-cell
  - process
requiredTargetEndpointBindings:
  - bindingId: primary
    purpose: quic-endpoint
    endpointType: quic
    protocols:
      - quic
defaultArguments:
  - --sni
  - localhost
  - --alpn
  - plab-raw-quic
supportedArtifactTypes:
  - type: validation.json
    producedByStates:
      - stopped
      - failed
  - type: result.json
    producedByStates:
      - stopped
      - failed
  - type: load-tool.stdout.txt
    producedByStates:
      - stopped
      - failed
  - type: load-tool.stderr.txt
    producedByStates:
      - stopped
      - failed
  - type: load-tool-execution.json
    producedByStates:
      - stopped
      - failed
metricsAvailability:
  available: true
  availableKinds:
    - raw-quic-json
    - session
    - validation
parser:
  id: raw-quic-json
  preservesRawOutput: true
telemetry:
  supported: true
  supported_contract_versions:
    - telemetry-bundle-v1
  supported_scopes:
    - test-executor
    - load-generator
  supported_artifact_kinds:
    - summary
    - metrics
    - stdout
    - stderr
    - raw
  export_modes:
    - inline
    - artifact-bundle
  metadata:
    optional: true
    implementation_owned: false
    description: The executor emits raw-quic-json metrics to stdout and relies on the runner to retain stdout and stderr artifacts.
