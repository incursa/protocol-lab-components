schemaVersion: "1.0"
id: go-dns-dot
name: Go DNS-over-TLS Local Fixture Authority
description: Authoritative target serving only dns.plab-test-a.canonical over exact TLS 1.3 with ALPN dot; recursion, upstreams, caches, and other DNS bindings are absent.
family: go-secure-dns
role: authoritative-server
targetKind: process
targetContract: process
executable: bin/linux-x64/go-dns-dot
workingDirectory: .
baseUrl: tls://127.0.0.1:18530
protocolBaseUrls: {dot: tls://127.0.0.1:18530}
certificateMode: plab-secure-dns-single-leaf-p256-v1
roles: [authoritative-server]
protocols: [dot]
supportedProtocols: [dot]
supportedWorkloadFamilies: [dns.secure]
supportedProtocolVersions: [DoT/TLS1.3]
supportedScenarios: [dns.dot.query.a]
supportedTestCaseIds: [dns.dot.query.a]
scenarioCoverage:
  dns.dot.query.a: {status: supported, behavior: fixed local authoritative plab.test. IN A response with 192.0.2.1 and TTL zero}
  dns.classic.tcp.query.a: {status: unsupported, reason: Classic DNS/TCP is a separate evidence lane.}
  dns.classic.udp-truncated-tcp-retry: {status: unsupported, reason: Classic DNS/UDP and fallback are absent.}
  dns.classic.udp.query.a: {status: unsupported, reason: Classic DNS/UDP is a separate evidence lane.}
  dns.doh2.query.a: {status: unsupported, reason: DoH2 is a separate executor and target lane.}
  dns.doh3.get.a: {status: unsupported, reason: DoH3 is a separate executor and target lane.}
  dns.doh3.query.a: {status: unsupported, reason: DoH3 is a separate executor and target lane.}
  dns.doh3.query.aaaa: {status: unsupported, reason: The AAAA semantic fixture is not materialized by this target.}
  dns.doh3.query.cname-chain: {status: unsupported, reason: The CNAME-chain semantic fixture is not materialized by this target.}
  dns.doh3.query.large-dnssec-shaped: {status: unsupported, reason: The large DNSSEC-shaped semantic fixture is not materialized by this target.}
  dns.doh3.query.nodata: {status: unsupported, reason: The NODATA semantic fixture is not materialized by this target.}
  dns.doh3.query.nxdomain: {status: unsupported, reason: The NXDOMAIN semantic fixture is not materialized by this target.}
  dns.doq.query.a: {status: unsupported, reason: DoQ is a separate executor and target lane.}
unsupportedKnownCases: [dns.classic.tcp.query.a, dns.classic.udp-truncated-tcp-retry, dns.classic.udp.query.a, dns.doh2.query.a, dns.doh3.get.a, dns.doh3.query.a, dns.doh3.query.aaaa, dns.doh3.query.cname-chain, dns.doh3.query.large-dnssec-shaped, dns.doh3.query.nodata, dns.doh3.query.nxdomain, dns.doq.query.a]
ports: [{name: dot, protocol: tcp, default: 18530, hostPort: 18530, containerPort: 18530}]
environment: {PLAB_DOT_PORT: "18530"}
startup: {port: {name: dot, environmentVariable: PLAB_DOT_PORT, default: 18530}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 500}
capabilities: [dns.authoritative-server, dns.dot, dns.local-fixture-only, tls13, dnsTwoOctetFraming, scenario.dns.dot.query.a]
entrypoint: {kind: process, path: bin/linux-x64/go-dns-dot, arguments: [], workingDirectory: .}
shutdownBehavior: graceful-termination
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
notes: The target has no resolver, upstream, cache, UDP, DoH, or DoQ path. Its package-local leaf private key is test-only material and is never an evidence artifact.
