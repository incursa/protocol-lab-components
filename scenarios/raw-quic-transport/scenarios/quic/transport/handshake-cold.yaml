schemaVersion: "1.0"
id: quic.transport.handshake-cold
version: "1.0"
title: QUIC Cold Handshake
name: QUIC Cold Handshake
family: quic.transport
description: Validate cold QUIC connection setup as a transport scenario independent of HTTP/3 application semantics.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: handshake-only
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicHandshake
quicTransport:
  behavior: handshake-cold
  connectionCount: 1
  streamType: none
  streamCount: 0
  payloadDirection: none
  openPattern: sequential
  expectedBytes: 0
validation:
  required: true
  checks:
    - handshake-completes
    - fresh-session-handshake
    - connection-success-count-matches-expected
    - protocol:quic
  quic:
    handshakeMustComplete: true
    session:
      resumptionState: fresh
      earlyData: not-attempted
      replaySafety: not-applicable
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 0
benchmarkCompat:
  compatibleLoadShapes:
    - quic-handshake
    - smoke
    - regression
    - comparison
  primaryMetrics:
    - handshakeDurationP50
    - handshakeDurationP95
    - connectionSuccessRate
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - quic.handshake.durationMs
  - quic.connection.successCount
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase6
  - quic
  - handshake
