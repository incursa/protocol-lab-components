schemaVersion: "1.0"
id: node-http1
name: Node.js node:http HTTP/1
description: Independent Node.js node:http HTTP/1.1 origin in a digest-pinned official runtime image.
family: node-http
role: server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-node-http1:0.1.0
dockerfile: Dockerfile
buildContext: .
baseUrl: http://127.0.0.1:8080
dockerBaseUrl: http://127.0.0.1:8080
protocolBaseUrls: {h1: http://127.0.0.1:8080}
dockerProtocolBaseUrls: {h1: http://127.0.0.1:8080}
dockerNetworkMode: published-port
certificateMode: none
roles: [server]
protocols: [h1]
supportedProtocols: [h1]
supportedWorkloadFamilies: [http.application]
protocolVersions: [http/1.1]
ports:
  - {name: http, protocol: tcp, default: 8080, hostPort: 8080, containerPort: 8080}
environment: {PLAB_HTTP_PORT: "8080"}
startup:
  port: {name: http, environmentVariable: PLAB_HTTP_PORT, default: 8080}
  readiness: {protocol: http, path: /health, expectedStatus: 200}
readinessCheck: {type: http, url: /health, timeoutSeconds: 20}
capabilities: [http.server, httpPlaintext, httpJson]
supportedProtocolVersions: [http/1.1]
supportedTestCaseIds: [http1.core.plaintext, http1.core.json]
supportedScenarios: [http1.core.plaintext, http1.core.json]
unsupportedKnownCases: [h2, h3, https, websocket, server-sent-events]
requiredExternalTools: [docker]
runtime:
  upstreamProgram: Node.js
  upstreamProgramModified: false
  imageReference: node@sha256:820e86612c21d0636580206d802a726f2595366e1b867e564cbc652024151e8a
  nodeVersion: 24.4.1
endpoints:
  plaintext: {method: GET, path: /plaintext}
  json: {method: GET, path: /json}
shutdownBehavior: runner-owned-docker-container
artifactExports: [node-http1.log]
qlogSupport: false
sslKeyLogSupport: false
notes: HTTP/1-only Node.js origin cohort member.
