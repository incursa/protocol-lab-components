Listen 8080

<VirtualHost *:8080>
    ServerName apache.plab.test
    Protocols http/1.1
    DocumentRoot /var/www/protocol-lab

    <Directory /var/www/protocol-lab>
        Require all granted
        Options -Indexes
    </Directory>

    Alias /health /var/www/protocol-lab/health
    Alias /plaintext /var/www/protocol-lab/plaintext
    Alias /json /var/www/protocol-lab/json
    Alias /bytes/1024 /var/www/protocol-lab/bytes-1024
    Alias /headers/response /var/www/protocol-lab/headers
    Alias /protocol-lab/metadata /var/www/protocol-lab/metadata

    <Location /health>
        ForceType text/plain
    </Location>
    <Location /plaintext>
        ForceType text/plain
    </Location>
    <Location /json>
        ForceType application/json
    </Location>
    <Location /bytes/1024>
        ForceType application/octet-stream
    </Location>
    <Location /headers/response>
        ForceType text/plain
        Header always set X-ProtocolLab-Fixture "apache-http1"
        Header always set X-ProtocolLab-Header-Shape "fixed-v1"
    </Location>
    <Location /protocol-lab/metadata>
        ForceType application/json
    </Location>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
