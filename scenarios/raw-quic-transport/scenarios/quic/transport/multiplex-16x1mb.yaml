schemaVersion: "1.0"
id: quic.transport.multiplex.16x1mb
title: QUIC Multiplex 16x1MB
name: QUIC Multiplex 16x1MB
family: quic.transport
description: Validate 16 concurrent 1MB bidirectional QUIC streams to expose sustained multiplexed payload pressure.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles: [server]
requires:
  capabilities: [quic.server]
  protocols: [quic]
  roles: [server]
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities: [quicTransport, quicStreams, quicMultiplexing]
quicTransport:
  behavior: multiplex-streams
  connectionCount: 1
  streamType: bidirectional
  streamCount: 16
  payloadSizeBytes: 1048576
  payloadDirection: bidirectional
  openPattern: concurrent
  expectedBytes: 33554432
validation:
  required: true
  checks: [quic-transport-metrics, bytes-sent-received-match-expected, completed-streams-match-expected, zero-timeouts-and-errors, concurrent-streams-complete, "protocol:quic"]
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections: [1, 4, 16, 32]
  streamsPerConnection: [16]
benchmarkCompat:
  compatibleLoadShapes: [quic-stream, comparison]
  primaryMetrics: [bytesPerSecond, streamsPerSecond, maxActiveStreams, errorRate]
artifacts:
  required: [validation.json, result.json]
  optional: [protocol-diagnostic-artifact, counters]
networkProfile: clean
requiredMetrics: [quic.stream.maxActiveStreams, quic.stream.completedStreams]
artifactRequirements: [load-generator.stdout.txt, load-generator.stderr.txt, protocol-diagnostic-unavailable-note]
tags: [quic, multiplexing, payload-1mb]
