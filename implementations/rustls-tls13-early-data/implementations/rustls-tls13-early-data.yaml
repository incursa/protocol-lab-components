schemaVersion: "1.0"
id: rustls-tls13-early-data
name: rustls TLS 1.3 Early Data Target
description: Process target for exact accepted and rejected TLS 1.3 early-data contracts.
family: rustls-tls
role: library-backed-target
targetKind: process
targetContract: process
executable: bin/linux-x64/rustls-tls13-early-data
workingDirectory: .
baseUrl: tls://127.0.0.1:18446
protocolBaseUrls: {tls: tls://127.0.0.1:18446}
certificateMode: plab-single-leaf-p256-server-v2
roles: [server, library-backed-target]
protocols: [tls]
supportedProtocols: [tls]
supportedProtocolVersions: [TLS1.3]
supportedWorkloadFamilies: [tls, tls.lifecycle, tls.early-data]
supportedScenarios: [tls.early-data.accepted, tls.early-data.rejected]
supportedTestCaseIds: [tls.early-data.accepted, tls.early-data.rejected]
scenarioCoverage:
  tls.handshake.full: {status: unsupported, reason: This narrow target requires a proven source session and early-data operation.}
  tls.handshake.resumed: {status: unsupported, reason: This target requires an early-data outcome rather than a handshake-only resumption.}
  tls.handshake.full.tls12: {status: unsupported, reason: TLS 1.2 is disabled.}
  tls.handshake.full.chacha20: {status: unsupported, reason: Only TLS_AES_128_GCM_SHA256 is enabled.}
  tls.handshake.mutual-auth: {status: unsupported, reason: Client certificates are not part of this profile.}
  tls.early-data.accepted: {status: supported, behavior: exact PSK-resumed TLS 1.3 operation with 1024 accepted replay-safe early bytes}
  tls.early-data.rejected: {status: supported, behavior: exact PSK-resumed TLS 1.3 operation with rejected early bytes and one post-handshake retry}
  tls.key-update.diagnostic: {status: unsupported, reason: KeyUpdate diagnostics are not implemented.}
  tls.record.coverage: {status: unsupported, reason: Record-boundary diagnostics are not implemented.}
  tls.record.throughput: {status: unsupported, reason: Sustained record throughput is not implemented.}
unsupportedKnownCases: [tls.handshake.full, tls.handshake.resumed, tls.handshake.full.tls12, tls.handshake.full.chacha20, tls.handshake.mutual-auth, tls.key-update.diagnostic, tls.record.coverage, tls.record.throughput]
ports: [{name: tls, protocol: tcp, default: 18446}]
environment: {PLAB_LISTEN_ADDRESS: 127.0.0.1:18446, PLAB_SCENARIO_ID: tls.early-data.accepted}
startup: {port: {name: tls, environmentVariable: PLAB_TARGET_PORT, default: 18446}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 250}
capabilities: [tls.server, tls13, tlsX25519, tlsResumption, tlsEarlyData, scenario.tls.early-data.accepted, scenario.tls.early-data.rejected]
entrypoint: {kind: process, path: bin/linux-x64/rustls-tls13-early-data, arguments: [], workingDirectory: .}
shutdownBehavior: process
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
notes: The scenario identity selects one exact early-data outcome; accepted and rejected are never substituted.
