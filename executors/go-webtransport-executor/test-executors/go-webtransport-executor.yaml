executorIdentity: {id: go-webtransport-executor, name: Go WebTransport Test Executor, version: 0.1.0, vendor: Incursa}
versionCompatibility: {contractVersion: test-executor-v1, compatibleContractVersions: [test-executor-v1], executorVersion: 0.1.0}
claimedCapabilities:
  - {id: webtransport.session-bidi-echo, status: supported}
  - {id: webtransport-over-http3-proof, status: supported}
  - {id: exact-tls1.3-alpn-h3-proof, status: supported}
  - {id: one-client-initiated-bidirectional-stream, status: supported}
  - {id: deterministic-65536-byte-sha256-echo, status: supported}
  - {id: webtransport-datagrams, status: unsupported}
  - {id: masque, status: unsupported}
supportedTestSelectors: [{selectorType: test-id, expression: webtransport.session-bidi-echo}]
supportedScenarioSelectors: [{selectorType: scenario-id, expression: webtransport.session-bidi-echo}]
supportedProtocolFamilies: [webtransport, h3, quic, tls]
supportedExecutionModes: [single-cell, process]
requiredTargetEndpointBindings: [{bindingId: primary, purpose: webtransport-h3-endpoint, endpointType: https, protocols: [webtransport, h3]}]
supportedArtifactTypes:
  - {type: validation.json, producedByStates: [stopped, failed]}
  - {type: protocol-proof.json, producedByStates: [stopped, failed]}
  - {type: webtransport-summary.json, producedByStates: [stopped, failed]}
  - {type: payload-hash.json, producedByStates: [stopped, failed]}
  - {type: result.json, producedByStates: [stopped, failed]}
  - {type: webtransport-executor-result.json, producedByStates: [stopped, failed]}
  - {type: webtransport-load-summary.json, producedByStates: [stopped, failed]}
  - {type: webtransport-warmup-summary.json, producedByStates: [stopped, failed]}
  - {type: executor-identity.json, producedByStates: [stopped, failed]}
  - {type: load-generator-identity.json, producedByStates: [stopped, failed]}
  - {type: load.stdout.log, producedByStates: [stopped, failed]}
  - {type: load.stderr.log, producedByStates: [stopped, failed]}
  - {type: unsupported.json, producedByStates: [failed]}
metricsAvailability: {available: true, availableKinds: [validation, sessions-per-second, bytes-per-second, latency-percentiles, operation-outcomes, effective-streams]}
parser: {id: protocol-lab-webtransport-json, type: protocol-lab-webtransport-json, preservesRawOutput: true}
telemetry: {supported: true, supported_contract_versions: [telemetry-bundle-v1], supported_scopes: [test-executor, load-generator], supported_artifact_kinds: [summary, metrics, stdout, stderr, raw], export_modes: [inline, artifact-bundle]}
