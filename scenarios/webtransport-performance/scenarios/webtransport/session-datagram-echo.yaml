schemaVersion: "2.0"
version: 2.0.0
id: webtransport.session-datagram-echo
title: WebTransport Session Datagram Echo
description: Open one authenticated WebTransport-over-HTTP/3 session and echo 32 deterministic 256-byte WebTransport datagrams.
status: experimental
kind: workload
layer: application
protocol: webtransport
family: webtransport
semanticTemplateId: webtransport.session.datagram-echo-32x256b
protocolStack: [webtransport, h3, quic, tls1.3]
upstreamStandards: [https://datatracker.ietf.org/doc/draft-ietf-webtrans-http3/, https://www.rfc-editor.org/rfc/rfc9297]
roles: [client, server]
requires: {capabilities: [webtransport.client, webtransport.server, webtransport.datagrams], protocols: [webtransport, h3], roles: [client, server]}
trafficShape: datagram
executionProfile: {transportSecurity: tls, protocolVariant: webtransport-over-h3, implementationRole: origin-server, selectedComponentProofRequired: true, executionModePolicy: record-effective-mode}
webTransport:
  binding: webtransport-over-http3
  authority: webtransport.plab.test
  path: /webtransport/echo
  operation: session-datagram-echo
  sessionCount: 1
  datagramCount: 32
  payloadBytesPerDatagram: 256
  payloadDirection: client-to-server-then-server-to-client
  payloadGenerator: datagram-index-plus-octet-mod-251
  payloadSetSha256: 2e975a37b4bff0a8022c0f89ab19e9a8e2599300e557e9b8ce3eff364cd33e8b
  closeCode: 0
  connectionLifecycle: new-session-per-operation
  measuredWindow: session-establishment-and-datagram-round-trips
  handshake: {method: CONNECT, protocol: webtransport, scheme: https, authority: webtransport.plab.test, path: /webtransport/echo, responseStatus: 200, datagramsEnabled: true}
validation:
  required: true
  checks: [protocol:webtransport-over-h3, tls:1.3, alpn:h3, no-fallback, extended-connect, pseudo-protocol:webtransport, response-status:200, session-established, webtransport-datagrams-negotiated, datagram-count:32, datagram-bytes:256, datagram-payload-set-sha256, ordered-datagram-echo, session-close-code:0, zero-lost-datagrams, zero-unexpected-failures, zero-timeouts]
  protocol: {requested: webtransport-over-h3, expectedObserved: webtransport-over-h3, fallbackAllowed: false}
benchmarkCompat: {compatibleLoadShapes: [smoke], primaryMetrics: [sessionsPerSecond, datagramsPerSecond, datagramLatencyP95, datagramLatencyP99, failedOperations, timedOutOperations]}
requiredMetrics: [sessionsPerSecond, datagramsPerSecond, bytesPerSecond, datagramLatencyMean, datagramLatencyP50, datagramLatencyP75, datagramLatencyP90, datagramLatencyP95, datagramLatencyP99, completedOperations, failedOperations, timedOutOperations, sentDatagrams, receivedDatagrams, totalTransferredBytes, effectiveSessions]
artifacts: {required: [validation.json, protocol-proof.json, webtransport-summary.json, payload-hash.json, result.json, load.stdout.log, load.stderr.log], optional: [qlog, tls-key-log, target-telemetry.json, load-generator-telemetry.json]}
availability: {onUnsupported: unsupported, onUnavailable: unavailable, onBindingMismatch: validation-failed, knownUnsupported: [http3-request-response-substitution, websocket-over-h3-substitution, session-without-datagram-proof, payload-set-hash-unavailable, datagram-loss]}
networkProfile: clean
tags: [webtransport, h3, quic, datagram, echo, experimental]
