schemaVersion: "1.0"
id: grpc-js
name: Node grpc-js gRPC over HTTP/2 Target
description: Minimal Node grpc-js adapter for the canonical ProtocolLab protobuf service.
family: grpc-js
role: server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-grpc-js:0.1.1
dockerfile: docker/Dockerfile
buildContext: .
dockerNetworkMode: published-port
baseUrl: https://127.0.0.1:18444
dockerBaseUrl: https://127.0.0.1:18444
protocolBaseUrls: {h2: https://127.0.0.1:18444}
dockerProtocolBaseUrls: {h2: https://127.0.0.1:18444}
certificateMode: package-test-root
roles: [server]
protocols: [h2]
supportedProtocols: [h2]
supportedProtocolVersions: [HTTP/2.0]
supportedWorkloadFamilies: [grpc]
supportedScenarios: &scenarios [grpc.h2.unary.echo, grpc.h2.unary.fixed-metadata, grpc.h2.unary.large, grpc.h2.server-streaming.echo, grpc.h2.client-streaming.echo, grpc.h2.bidi-streaming.echo, grpc.h2.deadline-exceeded, grpc.h2.client-cancellation, grpc.h2.unary.echo-new-channel]
supportedTestCaseIds: *scenarios
scenarioCoverage:
  grpc.h2.unary.echo: {status: supported, behavior: exact unary echo}
  grpc.h2.unary.empty: {status: unsupported, reason: grpc-js completes an empty response without the executor-required five-byte DATA envelope}
  grpc.h2.unary.fixed-metadata: {status: supported, behavior: exact initial and trailing metadata}
  grpc.h2.unary.gzip: {status: unsupported, reason: grpc-js does not produce the executor-required compressed response envelope for this raw request}
  grpc.h2.unary.large: {status: supported, behavior: exact one-MiB unary echo}
  grpc.h2.server-streaming.echo: {status: supported, behavior: 100 ordered response messages}
  grpc.h2.client-streaming.echo: {status: supported, behavior: 100 requests and final response}
  grpc.h2.bidi-streaming.echo: {status: supported, behavior: 100 ordered echoes}
  grpc.h2.trailers-only-status: {status: unsupported, reason: grpc-js percent-encodes grpc-message while the executor requires the literal value}
  grpc.h2.deadline-exceeded: {status: supported, behavior: response withheld beyond deadline}
  grpc.h2.client-cancellation: {status: supported, behavior: ready metadata then cancellation}
  grpc.h2.unary.echo-new-channel: {status: supported, behavior: unary endpoint for fresh channel operations}
unsupportedKnownCases: [grpc-web, grpc-over-h3, h1, h2c, retries, hedging]
ports: [{name: grpc-h2, protocol: tcp, default: 18444, hostPort: 18444, containerPort: 18444}]
environment: {PLAB_TARGET_PORT: "18444"}
startup: {port: {name: grpc-h2, environmentVariable: PLAB_TARGET_PORT, default: 18444}, readiness: {protocol: process, timeoutSeconds: 30}}
readinessCheck: {type: processStarted, timeoutSeconds: 30, startupDelayMilliseconds: 1500}
capabilities: [scenario.grpc.h2.unary.echo, scenario.grpc.h2.unary.fixed-metadata, scenario.grpc.h2.unary.large, scenario.grpc.h2.server-streaming.echo, scenario.grpc.h2.client-streaming.echo, scenario.grpc.h2.bidi-streaming.echo, scenario.grpc.h2.deadline-exceeded, scenario.grpc.h2.client-cancellation, scenario.grpc.h2.unary.echo-new-channel, grpc.h2, grpc.streaming, grpc.terminal-outcomes, grpc.channel-churn, tls13, alpn.h2]
entrypoint: {kind: pwsh, path: run.ps1, arguments: [], workingDirectory: .}
shutdownBehavior: process
artifactExports: [command.txt, stdout.txt, stderr.txt, result.json]
qlogSupport: false
sslKeyLogSupport: false
notes: Nine rows pass the exact executor. Empty response framing, gzip response framing, and literal trailers-only grpc-message remain explicitly unsupported.
