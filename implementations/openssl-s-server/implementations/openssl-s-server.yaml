schemaVersion: "1.0"
id: openssl-s-server
name: OpenSSL s_server 3.3.0 TLS Endpoint
description: Docker source-built OpenSSL s_server diagnostic endpoint for the exact canonical TLS 1.3 full handshake.
family: openssl
role: tls-diagnostic-endpoint
targetKind: docker
targetContract: process
image: incursa-protocol-lab-openssl-s-server:0.1.1
dockerfile: docker/Dockerfile
buildContext: .
dockerNetworkMode: published-port
baseUrl: tls://127.0.0.1:18461
dockerBaseUrl: tls://127.0.0.1:18461
protocolBaseUrls: {tls: tls://127.0.0.1:18461}
dockerProtocolBaseUrls: {tls: tls://127.0.0.1:18461}
certificateMode: plab-single-leaf-p256-v1
roles: [server, tls-diagnostic-endpoint]
protocols: [tls]
supportedProtocols: [tls]
supportedProtocolVersions: [TLS1.3]
supportedWorkloadFamilies: [tls, tls.lifecycle]
supportedScenarios: [tls.handshake.full]
supportedTestCaseIds: [tls.handshake.full]
scenarioCoverage:
  tls.handshake.full: {status: supported, behavior: fresh TLS 1.3 handshake with AES-128-GCM-SHA256, X25519, canonical ECDSA leaf, protocol-lab-tls ALPN, tickets disabled, and no application data}
  tls.handshake.resumed: {status: unsupported, reason: The unmodified s_server CLI does not expose the connection-close-after-ticket lifecycle required by the existing executor or a single-use ticket acceptance policy.}
  tls.handshake.full.tls12: {status: unsupported, reason: This package deliberately pins TLS 1.3 only.}
  tls.handshake.full.chacha20: {status: unsupported, reason: This package deliberately enables only TLS_AES_128_GCM_SHA256.}
  tls.handshake.mutual-auth: {status: unsupported, reason: s_server can validate a client CA chain but cannot pin the canonical client leaf DER and SPKI identity required by the contract.}
  tls.early-data.accepted: {status: unsupported, reason: s_server does not implement the exact ProtocolLab early-data application effect and retry evidence contract.}
  tls.early-data.rejected: {status: unsupported, reason: s_server does not implement the exact ProtocolLab early-data rejection retry and deduplication contract.}
  tls.key-update.diagnostic: {status: unsupported, reason: The CLI does not expose the bilateral deterministic KeyUpdate observation contract; the dedicated OpenSSL KeyUpdate target owns that row.}
  tls.record.coverage: {status: unsupported, reason: s_server does not implement the PLABTLS1 six-case direction and payload-hash command protocol used by the compatible executor.}
  tls.record.throughput: {status: unsupported, reason: s_server does not implement the PLABTLS1 deterministic 1 MiB server-to-client payload command used by the compatible executor.}
unsupportedKnownCases: [tls.handshake.resumed, tls.handshake.full.tls12, tls.handshake.full.chacha20, tls.handshake.mutual-auth, tls.early-data.accepted, tls.early-data.rejected, tls.key-update.diagnostic, tls.record.coverage, tls.record.throughput]
ports: [{name: tls, protocol: tcp, default: 18461, hostPort: 18461, containerPort: 8443}]
environment: {PLAB_SCENARIO_ID: tls.handshake.full}
startup: {port: {name: tls, environmentVariable: PLAB_TARGET_PORT, default: 18461}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 250}
capabilities: [tls.server, tls13, tlsX25519, tlsFullHandshake, scenario.tls.handshake.full]
comparisonCohort: tls-endpoint-tool
rankingEligibility: diagnostic-only
entrypoint: {kind: bash, path: run.sh, arguments: [], workingDirectory: .}
shutdownBehavior: docker-container
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
executionMetadata: {manifest: protocol-lab.internal.json}
notes: This package source-builds the unmodified upstream diagnostic tool in its Docker target and is not an application-server or production-origin implementation.
