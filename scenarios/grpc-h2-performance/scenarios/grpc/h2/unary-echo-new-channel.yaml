schemaVersion: "2.0"
version: 2.0.0
id: grpc.h2.unary.echo-new-channel
title: gRPC over HTTP/2 Unary Echo With New Channel
description: Establish a fresh TLS and HTTP/2 channel and execute one deterministic unary Echo RPC inside the same measured operation.
status: draft
kind: workload
layer: application
protocol: h2
family: grpc
semanticTemplateId: grpc.unary.echo.new-channel
protocolStack: [grpc, h2, tls, tcp]
