# Load Profile Contract v2
schemaVersion: protocol-lab.load-profile.v2
version: 2.0.0

id: http2-comparison
title: HTTP/2 Comparison
status: stable
purpose: comparison

description: >
  Repeatable protocol-specific comparison profile for non-publishable performance evidence under a stable selection.

durationSeconds: 30
warmupSeconds: 10
cooldownSeconds: 5
repetitions: 3

http2:
  connections: 16
  concurrency: 128
  streamsPerConnection: 8
  operationDistribution: balanced-round-robin
  requestTimeoutSeconds: 10

evidence:
  minimumTier: comparison
  publishable: false

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
    - validation.json
    - protocol-proof.json
    - http2-topology.json
    - result.json
    - target-telemetry.json
    - load-generator-telemetry.json
  optional:
    - counters
    - telemetry-bundle.json
