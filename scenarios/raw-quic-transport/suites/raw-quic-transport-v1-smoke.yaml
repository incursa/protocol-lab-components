id: raw-quic-transport-v1-smoke
name: ProtocolLab raw QUIC transport package smoke suite
description: Package-backed raw QUIC smoke coverage for reusable throughput, sustained upload and download writes, latency, multiplexing, stream limit pressure, slow-reader flow control, large payload, stream churn, and duplex lanes.
purpose: smoke
resultKind: validation
loadProfileId: raw-quic-peer-confidence
scenarios:
  - quic.transport.stream-throughput.1mb
  - quic.transport.stream-download.1mb
  - quic.transport.sustained-stream.256x64kb
  - quic.transport.sustained-download.256x64kb
  - quic.transport.sustained-download.4096x1kb
  - quic.transport.latency.echo-1kb
  - quic.transport.multiplex.100x64kb
  - quic.transport.stream-limits.100x64kb
  - quic.transport.flow-control.slow-reader-16x64kb
  - quic.transport.payload.large-1mb
  - quic.transport.stream-churn
  - quic.transport.duplex-streams
  - quic.transport.duplex-streams-peer-matrix
protocol: quic
defaults:
  durationSeconds: 10
  warmupSeconds: 2
  repetitions: 1
testExecutors:
  - quic-go-raw-load
notes: The cancellation scenario is packaged but intentionally excluded from this suite until the raw executor supports reset and cancellation classification. Cold handshake and connection churn are executable through the raw peer comparison suite but remain outside this stream-oriented smoke suite because they require distinct lifecycle shapes. Stream churn is included with its scenario-owned one-connection, 1,000-stream shape. Resumption-rejected, resumed-handshake, zero-rtt-accepted, and zero-rtt-rejected also remain outside smoke until executable proof exists.
