key "plab-rndc" { algorithm hmac-sha256; secret "cHJvdG9jb2wtbGFiLXJlc29sdmVyLWNvbnRyb2w="; };
controls { inet 127.0.0.1 port 953 allow { 127.0.0.1; } keys { "plab-rndc"; }; };
options {
  directory "/var/cache/bind";
  pid-file "/var/cache/bind/resolver.pid";
  session-keyfile "/var/cache/bind/resolver-session.key";
  recursion yes;
  allow-recursion { any; };
  allow-query { any; };
  minimal-responses yes;
  dnssec-validation no;
  listen-on-v6 { none; };
  listen-on port 853 tls plab-tls { any; };
};
tls plab-tls {
  key-file "/opt/protocol-lab/bind-resolver/leaf-key.pem";
  cert-file "/opt/protocol-lab/bind-resolver/leaf.pem";
  protocols { TLSv1.3; };
};
zone "plab.test" {
  type forward;
  forward only;
  forwarders { 127.0.0.1 port 5353; };
};
