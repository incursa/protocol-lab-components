websocket: {binding: http1-upgrade, standard: rfc6455, scheme: wss, path: /websocket, subprotocol: null, operation: control-frames, messageType: none, messageBytes: 0, messageCount: 1, controlPayloadGenerator: exact-utf8, controlPayloadText: protocol-lab-ping, controlPayloadBytes: 17, controlPayloadSha256: 4848de689e96825e0e05b6c3e96e48f2ad7ec7805fb64ecf824ccc6aa9c58883, fragmentation: none, masking: client-required, closeCode: 1000, authority: websocket.plab.test, extensions: none, bootstrapPolicy: rfc6455-http1-upgrade, closeReasonPolicy: empty-utf8-reason, connectionLifecycle: pre-established-connection-per-operation, measuredWindow: control-frame-round-trip, handshake: {binding: http1-upgrade, requestMethod: GET, requestVersion: HTTP/1.1, requestHeaders: {host: websocket.plab.test, upgrade: websocket, connection: Upgrade, secWebSocketKeyPolicy: fresh-random-16-octets-per-opening-handshake, secWebSocketVersion: "13", originPresent: false, secWebSocketProtocolPresent: false, secWebSocketExtensionsPresent: false}, responseStatus: 101, responseHeaders: {upgrade: websocket, connection: Upgrade, secWebSocketAcceptPolicy: base64-sha1-runtime-key-plus-rfc6455-guid, secWebSocketProtocolPresent: false, secWebSocketExtensionsPresent: false}}}
