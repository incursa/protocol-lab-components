schemaVersion: "1.0"
id: quic-go-http3
name: quic-go HTTP/3
description: quic-go HTTP/3 server for ProtocolLab HTTP application scenarios, with a packaged Linux x64 process binary and Docker wrapper.
family: quic-go
role: server
targetKind: process
targetContract: process
executable: bash
workingDirectory: .
commandArguments:
  - runtimes/linux-x64/run-quic-go-http3-server.sh
  - --listen
  - :5446
image: incursa-protocol-lab-quic-go-http3:0.1.7
dockerfile: docker/quic-go-http3.Dockerfile
buildContext: .
dockerNetworkMode: published-port
baseUrl: https://127.0.0.1:5446
dockerBaseUrl: https://127.0.0.1:5446
protocolBaseUrls:
  h3: https://127.0.0.1:5446
dockerProtocolBaseUrls:
  h3: https://127.0.0.1:5446
certificateMode: generated-self-signed-loopback-certificate
roles:
  - server
protocols:
  - h3
supportedProtocols:
  - h3
supportedWorkloadFamilies:
  - http.application
  - http3.protocol
supportedProtocolVersions:
  - http/3
supportedScenarios:
  - http3.core.plaintext
  - http3.core.json
  - http3.core.status
  - http3.payload.bytes.1kb
  - http3.payload.bytes.64kb
  - http3.payload.bytes.1mb
  - http3.payload.stream.100x16kb
  - http3.headers.response-headers-50x32
  - http3.protocol.qpack-repeated-headers
supportedTestCaseIds:
  - http3.core.plaintext
  - http3.core.json
  - http3.core.status
  - http3.payload.bytes.1kb
  - http3.payload.bytes.64kb
  - http3.payload.bytes.1mb
  - http3.payload.stream.100x16kb
  - http3.headers.response-headers-50x32
  - http3.protocol.qpack-repeated-headers
scenarioCoverage:
  quic.transport.stream-throughput.1mb:
    status: unsupported
    reason: quic-go is packaged here as an HTTP/3 server, not a raw QUIC transport target.
  quic.transport.multiplex.100x64kb:
    status: unsupported
    reason: quic-go is packaged here as an HTTP/3 server, not a raw QUIC transport target.
  http3.core.status:
    status: supported
    endpoint: /status
  http3.core.plaintext:
    status: supported
    endpoint: /plaintext
  http3.core.json:
    status: supported
    endpoint: /json
  http3.payload.bytes.1kb:
    status: supported
    scenarioId: http3.payload.bytes.1kb
    endpoint: /bytes/1024
  http3.payload.bytes.64kb:
    status: supported
    scenarioId: http3.payload.bytes.64kb
    endpoint: /bytes/65536
  http3.payload.bytes.1mb:
    status: supported
    scenarioId: http3.payload.bytes.1mb
    endpoint: /bytes/1048576
  http3-streaming:
    status: supported
    scenarioId: http3.payload.stream.100x16kb
    endpoint: /stream/bytes?chunks=100&size=16384&delayMs=0
    behavior: streams 100 deterministic 16 KiB chunks without prebuffering the full body.
  http3-header-heavy-qpack:
    status: supported
    scenarioId: http3.headers.response-headers-50x32
    endpoint: /headers/response?count=50&size=32
  http3.protocol.qpack-repeated-headers:
    status: supported
    scenarioId: http3.protocol.qpack-repeated-headers
    executorId: h3spec-http3-qpack
  websocket-over-h3:
    status: unsupported
    scenarioId: http3.websocket.rfc9220.extended-connect
    reason: Package does not expose RFC9220 WebSocket-over-H3 behavior.
  h3spec-qpack-executor:
    status: compatible-target-unproven
    executorId: h3spec-http3-qpack
    reason: No quic-go package-backed h3spec/QPACK target proof is recorded here.
unsupportedKnownCases:
  - h1
  - h2
  - h2c
  - raw-quic
  - websocket
  - server-sent-events
ports:
  - name: h3
    protocol: udp
    hostPort: 5446
    containerPort: 4433
environment:
  PLAB_HTTP_PORT: "5446"
startup:
  port:
    name: h3
    environmentVariable: PLAB_HTTP_PORT
    default: 5446
  readiness:
    protocol: https
    path: /health
    expectedStatus: 200
    certificateValidation: disabled-for-local-self-signed-certificate
readinessCheck:
  type: http
  url: /health
  timeoutSeconds: 30
capabilities:
  - http.server
  - httpPlaintext
  - httpJson
  - httpStatus
  - httpBytes
  - httpStreaming
  - httpHeaders
  - h3.server
  - quic.server
  - h3Protocol
  - h3Qpack
entrypoint:
  kind: pwsh
  path: run.ps1
  arguments: []
  workingDirectory: .
endpoints:
  health:
    method: GET
    path: /health
  status:
    method: GET
    path: /status
  metadata:
    method: GET
    path: /protocol-lab/metadata
  plaintext:
    method: GET
    path: /plaintext
  json:
    method: GET
    path: /json
  bytes1kb:
    method: GET
    path: /bytes/1024
  bytes64kb:
    method: GET
    path: /bytes/65536
  bytes1mb:
    method: GET
    path: /bytes/1048576
  streamBytes100x16kb:
    method: GET
    path: /stream/bytes?chunks=100&size=16384&delayMs=0
  responseHeaders50x32:
    method: GET
    path: /headers/response?count=50&size=32
shutdownBehavior: process
artifactExports:
  - command.txt
  - stdout.txt
  - stderr.txt
  - result.json
qlogSupport: false
sslKeyLogSupport: false
executionMetadata:
  manifest: protocol-lab.internal.json
notes: Server-only quic-go HTTP/3 lane. Keep separate from the quic-go raw load executor package. The streaming route writes 100 deterministic 16 KiB chunks without prebuffering the full 1.6 MiB body.
