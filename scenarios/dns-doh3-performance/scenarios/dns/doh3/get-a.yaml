  expectedResponse: {rcode: NOERROR, answer: 192.0.2.1, ttl: 0, answerCount: 1, authorityCount: 0, additionalCount: 0, truncated: false, wireLength: 43, normalizedWireSha256: 9d488461675ad5ab9f74c7b203861e1ad17521e413a407a25e6611012a595620}
