schemaVersion: "1.0"
id: go-tls13
name: Go crypto/tls TLS 1.3 Target
description: Process target for exact TLS 1.3 full/resumed handshakes and deterministic record-transfer workloads.
family: go-tls
role: library-backed-target
targetKind: process
targetContract: process
executable: bin/linux-x64/go-tls13
workingDirectory: .
baseUrl: tls://127.0.0.1:18443
protocolBaseUrls: {tls: tls://127.0.0.1:18443}
certificateMode: plab-single-leaf-p256-v1
roles: [server, library-backed-target]
protocols: [tls]
supportedProtocols: [tls]
supportedProtocolVersions: [TLS1.3]
supportedWorkloadFamilies: [tls, tls.lifecycle, tls.record]
supportedScenarios: [tls.handshake.full, tls.handshake.resumed, tls.record.throughput, tls.record.coverage]
supportedTestCaseIds: [tls.handshake.full, tls.handshake.resumed, tls.record.throughput, tls.record.coverage]
scenarioCoverage:
  tls.handshake.full: {status: supported, behavior: exact fresh TLS 1.3 handshake with no client session cache}
  tls.handshake.resumed: {status: supported, behavior: full source session followed by accepted one-time TLS 1.3 PSK resumption}
  tls.handshake.full.tls12: {status: unsupported, reason: TLS 1.2 is not enabled.}
  tls.handshake.full.chacha20: {status: unsupported, reason: The exact ChaCha20 profile is not implemented.}
  tls.handshake.mutual-auth: {status: unsupported, reason: Client authentication is not implemented.}
  tls.early-data.accepted: {status: unsupported, reason: Early data is not implemented.}
  tls.early-data.rejected: {status: unsupported, reason: Early data rejection is not implemented.}
  tls.key-update.diagnostic: {status: unsupported, reason: KeyUpdate diagnostics are not implemented.}
  tls.record.coverage: {status: supported, behavior: six fresh authenticated connections transfer the exact repeated-octet payload matrix in both directions}
  tls.record.throughput: {status: supported, behavior: exact 1 MiB repeated-octet server-to-client transfer on a fresh pre-established full-authenticated connection}
unsupportedKnownCases: [tls.handshake.full.tls12, tls.handshake.full.chacha20, tls.handshake.mutual-auth, tls.early-data.accepted, tls.early-data.rejected, tls.key-update.diagnostic]
ports: [{name: tls, protocol: tcp, default: 18443}]
environment: {PLAB_LISTEN_ADDRESS: 127.0.0.1:18443}
startup: {port: {name: tls, environmentVariable: PLAB_TARGET_PORT, default: 18443}, readiness: {protocol: process, timeoutSeconds: 10}}
readinessCheck: {type: processStarted, timeoutSeconds: 10, startupDelayMilliseconds: 250}
capabilities: [tls.server, tls13, tlsX25519, tlsFullHandshake, tlsResumedHandshake, tlsSessionTickets, tlsRecordTransfer, tlsRecordCoverage, scenario.tls.handshake.full, scenario.tls.handshake.resumed, scenario.tls.record.throughput, scenario.tls.record.coverage]
entrypoint: {kind: process, path: bin/linux-x64/go-tls13, arguments: [], workingDirectory: .}
shutdownBehavior: process
artifactExports: []
qlogSupport: false
sslKeyLogSupport: false
notes: Record payloads are exact application-byte transfers. Encrypted wire-record deltas are observable, but crypto/tls record fragmentation is not claimed as a controlled public requirement.
