global
    log stdout format raw local0
    nbthread 1
    tune.quic.socket-owner listener

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend protocol_lab_http1
    bind :8080
    http-response set-header X-ProtocolLab-Target haproxy-http1-gateway
    default_backend protocol_lab_fixture

frontend protocol_lab_http2
    bind :8082 proto h2
    http-response set-header X-ProtocolLab-Target haproxy-http2-gateway
    default_backend protocol_lab_fixture

frontend protocol_lab_http3
    bind quic4@:8443 ssl crt /usr/local/etc/haproxy/certs/haproxy.pem alpn h3
    http-response set-header X-ProtocolLab-Target haproxy-http3-gateway
    default_backend protocol_lab_fixture

backend protocol_lab_fixture
    http-request set-var(txn.protocol_lab_bytes) bool(true) if { path_beg /bytes/ }
    http-request set-path /plaintext.txt if { path /plaintext }
    http-request set-path /json.json if { path /json }
    http-request set-path /status.json if { path /status }
    http-response set-header Content-Type application/octet-stream if { var(txn.protocol_lab_bytes) -m bool }
    server fixture 127.0.0.1:9000 proto h1
