id: quic-transport-v1-comparison
name: ProtocolLab stable raw QUIC transport comparison suite
description: Stable raw QUIC comparison coverage across handshake, payload scaling, multiplexing, flow control, connection churn, stream churn, and duplex scenarios.
purpose: benchmark
resultKind: benchmark
loadProfileId: raw-quic-peer-confidence
scenarios:
  - quic.transport.latency.echo-1kb
  - quic.transport.stream-throughput.64kb
  - quic.transport.stream-throughput.1mb
  - quic.transport.stream-download.1mb
  - quic.transport.stream-throughput.16mb
  - quic.transport.sustained-stream.256x64kb
  - quic.transport.sustained-stream.16384x1kb
  - quic.transport.sustained-download.256x64kb
  - quic.transport.sustained-download.16384x1kb
  - quic.transport.sustained-download.4096x1kb
  - quic.transport.multiplex.100x1kb
  - quic.transport.multiplex.100x64kb
  - quic.transport.multiplex.16x1mb
  - quic.transport.multiplex.mixed-4x16
  - quic.transport.stream-limits.100x64kb
  - quic.transport.flow-control.slow-reader-16x64kb
  - quic.transport.connection-churn
  - quic.transport.stream-churn
  - quic.transport.duplex-streams
  - quic.transport.duplex-streams.16x1mb
  - quic.transport.handshake-cold
protocol: quic
defaults:
  durationSeconds: 15
  warmupSeconds: 5
  repetitions: 5
counterCapture:
  enabledByDefault: false
  tool: dotnet-counters
notes: Stable raw QUIC comparison input. The raw-quic-peer-confidence profile supplies timing and repetition policy while each scenario retains its valid connection and stream matrix. Connection churn establishes a fresh connection per operation; stream churn opens and closes 1,000 sequential streams on one stable connection. Stream-limit pressure intentionally remains a one-connection semantic capacity check. The fixed-total write-granularity lanes compare 256x64KiB with 16,384x1KiB application writes for the same exact 16MiB transfer in each direction; each operation uses one stable bidirectional stream. The sustained 4096x1KB download lane remains a shorter 4MiB pressure lane. The mixed-size lane repeats exact 1KB, 16KB, 64KB, and 1MB payloads across 16 concurrent streams per stable connection. The slow-reader lane delays response reads by exactly 100 milliseconds to expose sender-side backpressure. Evidence remains local-lab only.
