    queryEncoding: base64url-unpadded
    queryValue: AAAAAAABAAAAAAAABHBsYWIEdGVzdAAAAQAB
    requestTarget: /dns-query?dns=AAAAAAABAAAAAAAABHBsYWIEdGVzdAAAAQAB
