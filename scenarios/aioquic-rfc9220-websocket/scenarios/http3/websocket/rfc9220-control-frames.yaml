schemaVersion: "1.0"
id: http3.websocket.rfc9220.control-frames
title: RFC9220 WebSocket Control Frames
name: RFC9220 WebSocket Control Frames
family: websocket
description: Validate WebSocket-over-HTTP/3 ping and pong control-frame behavior through the proof endpoint.
status: stable
kind: protocolValidation
layer: application
protocol: h3
protocols:
  - h3
  - websocket
roles:
  - server
requires:
  capabilities:
    - h3.server
    - websocket.server
  protocols:
    - h3
    - websocket
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - rfc9220WebSocket
validation:
  required: true
  checks:
    - server-ping-client-pong
    - client-ping-server-pong
artifacts:
  required:
    - client-result.json
  optional:
    - stdout.txt
    - stderr.txt
    - qlog
    - sslkeylog
networkProfile: clean
tags:
  - http
  - h3
  - websocket
  - rfc9220
  - control-frames
