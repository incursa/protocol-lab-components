executorIdentity:
  id: go-http1-executor
  name: Go HTTP/1 Test Executor
  version: 0.3.0
  vendor: Incursa
versionCompatibility:
  contractVersion: test-executor-v1
  compatibleContractVersions:
    - test-executor-v1
  executorVersion: 0.3.0
claimedCapabilities:
  - id: http1.core.plaintext
    status: supported
  - id: http1.core.json
    status: supported
  - id: exact-http1.1-protocol-proof
    status: supported
  - id: deterministic-payload-length-and-sha256
    status: supported
  - id: h2
    status: unsupported
  - id: h3
    status: unsupported
  - id: https
    status: unsupported
  - id: request-body-echo
    status: unsupported
  - id: payload-bytes
    status: unsupported
  - id: load-generation
    status: supported
supportedTestSelectors:
  - selectorType: test-id
    expression: http1.core.plaintext
  - selectorType: test-id
    expression: http1.core.json
supportedScenarioSelectors:
  - selectorType: scenario-id
    expression: http1.core.plaintext
  - selectorType: scenario-id
    expression: http1.core.json
supportedProtocolFamilies:
  - h1
supportedExecutionModes:
  - single-cell
  - process
requiredTargetEndpointBindings:
  - bindingId: primary
    purpose: test-endpoint
    endpointType: http
    protocols:
      - h1
supportedArtifactTypes:
  - type: validation.json
    producedByStates:
      - stopped
      - failed
  - type: result.json
    producedByStates:
      - stopped
      - failed
  - type: protocol-proof.json
    producedByStates:
      - stopped
      - failed
  - type: executor-identity.json
    producedByStates:
      - stopped
      - failed
  - type: load-generator-identity.json
    producedByStates:
      - stopped
      - failed
  - type: http-executor-result.json
    producedByStates:
      - stopped
      - failed
  - type: oha.stdout.json
    producedByStates:
      - stopped
      - failed
  - type: oha.stderr.txt
    producedByStates:
      - stopped
      - failed
metricsAvailability:
  available: true
  availableKinds:
    - validation
    - requests-per-second
    - bytes-per-second
    - latency-percentiles
    - operation-outcomes
parser:
  id: protocol-lab-http-json
  type: protocol-lab-http-json
  preservesRawOutput: true
telemetry:
  supported: true
  supported_contract_versions:
    - telemetry-bundle-v1
  supported_scopes:
    - test-executor
    - load-generator
  supported_artifact_kinds:
    - summary
    - metrics
    - stdout
    - stderr
    - raw
  export_modes:
    - inline
    - artifact-bundle
  metadata:
    optional: true
    implementation_owned: true
    description: The executor emits validation and protocol-proof artifacts. The invoking runner or package host owns raw stdout and stderr preservation.
