schemaVersion: "1.0"
id: quic.transport.stream-throughput.64kb
title: QUIC Stream Throughput 64KB
name: QUIC Stream Throughput 64KB
family: quic.transport
description: Validate single-stream 64KB QUIC upload throughput independently of HTTP/3 application semantics.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles: [server]
requires:
  capabilities: [quic.server]
  protocols: [quic]
  roles: [server]
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities: [quicTransport, quicStreams]
quicTransport:
  behavior: stream-throughput
  connectionCount: 1
  streamType: bidirectional
  streamCount: 1
  payloadSizeBytes: 65536
  payloadDirection: client-to-server
  openPattern: sequential
  expectedBytes: 65536
validation:
  required: true
  checks: [payload-bytes-delivered, completed-streams-match-expected, zero-timeouts-and-errors, "protocol:quic"]
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections: [1, 4, 16, 32, 64, 128]
  streamsPerConnection: [1]
benchmarkCompat:
  compatibleLoadShapes: [quic-stream, comparison]
  primaryMetrics: [bytesPerSecond, streamsPerSecond, streamDurationP95, errorRate]
artifacts:
  required: [validation.json, result.json]
  optional: [protocol-diagnostic-artifact, counters]
networkProfile: clean
requiredMetrics: [quic.stream.bytesPerSecond, quic.stream.completedStreams]
artifactRequirements: [load-generator.stdout.txt, load-generator.stderr.txt, protocol-diagnostic-artifact]
tags: [quic, throughput, payload-64kb]
