schemaVersion: "1.0"
id: nginx-http1
name: nginx HTTP/1
description: Lane-scoped nginx HTTP/1.1 target built from the official nginx image pinned by OCI digest.
family: nginx
role: server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-nginx-http1:0.1.1
dockerfile: Dockerfile
buildContext: .
baseUrl: http://127.0.0.1:8080
dockerBaseUrl: http://127.0.0.1:8080
protocolBaseUrls:
  h1: http://127.0.0.1:8080
dockerProtocolBaseUrls:
  h1: http://127.0.0.1:8080
dockerNetworkMode: published-port
certificateMode: none
roles:
  - server
protocols:
  - h1
supportedProtocols:
  - h1
supportedWorkloadFamilies:
  - http.application
protocolVersions:
  - http/1.1
entrypoint:
  kind: pwsh
  path: run.ps1
  arguments: []
  workingDirectory: .
ports:
  - name: http
    protocol: tcp
    default: 8080
    hostPort: 8080
    containerPort: 8080
environment:
  PLAB_HTTP_PORT: "8080"
startup:
  port:
    name: http
    environmentVariable: PLAB_HTTP_PORT
    default: 8080
  readiness:
    protocol: http
    path: /health
    expectedStatus: 200
readinessCheck:
  type: http
  url: /health
  timeoutSeconds: 20
capabilities:
  - http.server
  - httpPlaintext
  - httpJson
supportedProtocolVersions:
  - http/1.1
supportedTestCaseIds:
  - http1.core.plaintext
  - http1.core.json
supportedScenarios:
  - http1.core.plaintext
  - http1.core.json
unsupportedKnownCases:
  - h2
  - h3
  - https
  - request-body-echo
  - server-sent-events
requiredExternalTools:
  - docker
runtime:
  upstreamProgram: nginx
  upstreamProgramModified: false
  imageReference: nginx@sha256:d67ea0d64d518b1bb04acde3b00f722ac3e9764b3209a9b0a98924ba35e4b779
  nginxVersion: 1.29.0
endpoints:
  plaintext:
    method: GET
    path: /plaintext
  json:
    method: GET
    path: /json
shutdownBehavior: runner-owned-docker-container
artifactExports:
  - nginx-http1.log
qlogSupport: false
sslKeyLogSupport: false
notes: HTTP/1-only nginx lane. Do not use as an nginx HTTP/2 or HTTP/3 package.
