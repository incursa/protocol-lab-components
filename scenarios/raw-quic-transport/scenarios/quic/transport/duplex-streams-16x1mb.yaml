schemaVersion: "1.0"
id: quic.transport.duplex-streams.16x1mb
title: QUIC Duplex Streams 16x1MB
name: QUIC Duplex Streams 16x1MB
family: quic.transport
description: Validate simultaneous bidirectional transfer across 16 concurrent 1MB QUIC streams.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles: [server]
requires:
  capabilities: [quic.server]
  protocols: [quic]
  roles: [server]
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities: [quicTransport, quicStreams, quicDuplex]
quicTransport:
  behavior: duplex-streams
  connectionCount: 1
  streamType: bidirectional
  streamCount: 16
  payloadSizeBytes: 1048576
  payloadDirection: bidirectional
  openPattern: concurrent
  expectedBytes: 33554432
validation:
  required: true
  checks: [quic-transport-metrics, bytes-sent-received-match-expected, completed-streams-match-expected, zero-timeouts-and-errors, bidirectional-payloads-complete, "protocol:quic"]
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections: [1, 4, 16, 32]
  streamsPerConnection: [16]
benchmarkCompat:
  compatibleLoadShapes: [quic-stream, comparison]
  primaryMetrics: [bytesPerSecond, streamsPerSecond, streamDurationP95, errorRate]
artifacts:
  required: [validation.json, result.json]
  optional: [protocol-diagnostic-artifact, counters]
networkProfile: clean
requiredMetrics: [quic.stream.bytesSent, quic.stream.bytesReceived, quic.stream.completedStreams]
artifactRequirements: [load-generator.stdout.txt, load-generator.stderr.txt, protocol-diagnostic-unavailable-note]
tags: [quic, duplex, payload-1mb]
