schemaVersion: "1.0"
id: quic.transport.sustained-stream.256x64kb
title: QUIC Sustained Stream 256x64KB
name: QUIC Sustained Stream 256x64KB
family: quic.transport
description: Validate a long-lived QUIC stream carrying exactly 256 sequential 64KB application writes without stream or connection churn.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: streaming-upload
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
quicTransport:
  behavior: sustained-stream-256x64kb
  connectionCount: 1
  streamType: bidirectional
  streamCount: 1
  payloadSizeBytes: 16777216
  payloadDirection: client-to-server
  openPattern: sequential
  expectedBytes: 16777216
validation:
  required: true
  checks:
    - quic-transport-metrics
    - payload-bytes-delivered
    - completed-streams-match-expected
    - zero-timeouts-and-errors
    - server-confirms-stream-consumption
    - protocol:quic
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 5
  connections:
    - 1
    - 4
    - 16
    - 32
    - 64
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - quic-stream
    - comparison
  primaryMetrics:
    - bytesPerSecond
    - streamDurationP95
    - writeCompletionP95
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - quic.stream.bytesPerSecond
  - quic.stream.completedStreams
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-unavailable-note
tags:
  - quic
  - sustained-stream
  - chunk-64kb
  - payload-16mb
