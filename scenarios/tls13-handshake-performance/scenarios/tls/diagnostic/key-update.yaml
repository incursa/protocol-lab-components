artifacts: {required: [validation.json, protocol-proof.json, tls-negotiation.json, key-update-proof.json, payload-hash.json, result.json, load.stdout.log, load.stderr.log], optional: [packet-summary.json]}
availability: {onUnsupported: unsupported, onUnavailable: unavailable, onBindingMismatch: validation-failed, knownUnsupported: [key-update-observation-unavailable]}
