id: raw-quic-transport-v1-smoke
name: ProtocolLab raw QUIC transport package smoke suite
description: Package-backed raw QUIC smoke coverage for reusable throughput, latency, multiplexing, stream limit pressure, large payload, and duplex lanes.
purpose: smoke
resultKind: validation
loadProfileId: smoke
scenarios:
  - quic.transport.stream-throughput.1mb
  - quic.transport.latency.echo-1kb
  - quic.transport.multiplex.100x64kb
  - quic.transport.stream-limits.100x64kb
  - quic.transport.payload.large-1mb
  - quic.transport.duplex-streams
protocol: quic
defaults:
  durationSeconds: 10
  warmupSeconds: 2
  repetitions: 1
  connections: 1
  streamsPerConnection: 1
testExecutors:
  - quic-go-raw-load
notes: The cancellation scenario is packaged but intentionally excluded from this suite until the raw executor supports reset and cancellation classification. The cold-handshake, stream-churn, resumption, and 0-RTT contracts are also packaged outside smoke until the executor surface grows to advertise them.
