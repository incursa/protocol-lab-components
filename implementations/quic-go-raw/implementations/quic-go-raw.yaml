schemaVersion: "1.0"
id: quic-go-raw
name: quic-go Raw QUIC
description: quic-go raw QUIC transport target for ProtocolLab latency echo, stream throughput, sustained upload and download writes, multiplexing, stream-limit pressure, slow-reader flow control, connection churn, stream churn, cold handshake, and duplex scenarios.
family: quic-go
role: server
targetKind: process
targetContract: process
executable: bin/linux-x64/quic-go-raw
workingDirectory: .
baseUrl: quic://127.0.0.1:5447/
protocolBaseUrls:
  quic: quic://127.0.0.1:5447/
certificateMode: generated-self-signed-loopback-certificate
roles:
  - server
protocols:
  - quic
supportedProtocols:
  - quic
supportedWorkloadFamilies:
  - quic.transport
supportedProtocolVersions:
  - quic
supportedScenarios:
  - quic.transport.stream-throughput.64kb
  - quic.transport.stream-throughput.1mb
  - quic.transport.stream-download.1mb
  - quic.transport.stream-throughput.16mb
  - quic.transport.sustained-stream.256x64kb
  - quic.transport.sustained-download.256x64kb
  - quic.transport.latency.echo-1kb
  - quic.transport.multiplex.100x1kb
  - quic.transport.multiplex.100x64kb
  - quic.transport.multiplex.16x1mb
  - quic.transport.stream-limits.100x64kb
  - quic.transport.flow-control.slow-reader-16x64kb
  - quic.transport.connection-churn
  - quic.transport.stream-churn
  - quic.transport.duplex-streams
  - quic.transport.duplex-streams.16x1mb
  - quic.transport.duplex-streams-peer-matrix
  - quic.transport.handshake-cold
supportedTestCaseIds:
  - quic.transport.stream-throughput.64kb
  - quic.transport.stream-throughput.1mb
  - quic.transport.stream-download.1mb
  - quic.transport.stream-throughput.16mb
  - quic.transport.sustained-stream.256x64kb
  - quic.transport.sustained-download.256x64kb
  - quic.transport.latency.echo-1kb
  - quic.transport.multiplex.100x1kb
  - quic.transport.multiplex.100x64kb
  - quic.transport.multiplex.16x1mb
  - quic.transport.stream-limits.100x64kb
  - quic.transport.flow-control.slow-reader-16x64kb
  - quic.transport.connection-churn
  - quic.transport.stream-churn
  - quic.transport.duplex-streams
  - quic.transport.duplex-streams.16x1mb
  - quic.transport.duplex-streams-peer-matrix
  - quic.transport.handshake-cold
scenarioCoverage:
  quic.transport.stream-throughput.64kb:
    status: supported
    behavior: client-to-server payload receipt
  quic.transport.stream-throughput.1mb:
    status: supported
    behavior: client-to-server payload receipt
  quic.transport.stream-download.1mb:
    status: supported
    behavior: exact deterministic 1MiB server-to-client payload after PLAB-DL1 request prelude
  quic.transport.stream-throughput.16mb:
    status: supported
    behavior: client-to-server payload receipt
  quic.transport.sustained-stream.256x64kb:
    status: supported
    behavior: consumes exactly 16MiB on one stream before confirming EOF
  quic.transport.sustained-download.256x64kb:
    status: supported
    behavior: sends an exact deterministic 16MiB payload as 256 sequential 64KiB writes after a PLAB-DL1 request prelude
  quic.transport.latency.echo-1kb:
    status: supported
    behavior: bidirectional 1KiB stream echo
  quic.transport.multiplex.100x1kb:
    status: supported
    behavior: 100 concurrent 1KiB bidirectional stream echoes
  quic.transport.multiplex.100x64kb:
    status: supported
    behavior: bidirectional stream echo
  quic.transport.multiplex.16x1mb:
    status: supported
    behavior: 16 concurrent 1MiB bidirectional stream echoes
  quic.transport.stream-limits.100x64kb:
    status: supported
    behavior: 100 concurrent bidirectional streams on one connection
  quic.transport.flow-control.slow-reader-16x64kb:
    status: supported
    behavior: 16 concurrent 64KiB bidirectional echoes with client response reads delayed by exactly 100ms
  quic.transport.connection-churn:
    status: supported
    behavior: fresh connection establishment with bidirectional stream echo
  quic.transport.stream-churn:
    status: supported
    behavior: sequential stream open-and-close churn with bidirectional echo
  quic.transport.duplex-streams:
    status: supported
    behavior: bidirectional 64KiB stream echo
  quic.transport.duplex-streams.16x1mb:
    status: supported
    behavior: 16 simultaneous 1MiB bidirectional stream echoes
  quic.transport.duplex-streams-peer-matrix:
    status: supported
    behavior: bidirectional 64KiB stream echo with comparison load shapes
  quic.transport.handshake-cold:
    status: supported
    behavior: fresh QUIC connection with no application stream requirement
  quic.transport.resumption-rejected:
    status: unsupported
    reason: quic-go raw target package does not currently expose a resumption rejection proof path.
  quic.transport.resumed-handshake:
    status: unsupported
    reason: quic-go raw target package does not currently expose a resumable handshake proof path.
  quic.transport.zero-rtt-accepted:
    status: unsupported
    reason: quic-go raw target package does not currently expose an executable zero-RTT acceptance proof path.
  quic.transport.zero-rtt-rejected:
    status: unsupported
    reason: quic-go raw target package does not currently expose an executable zero-RTT rejection proof path.
  quic.transport.payload.large-1mb:
    status: unsupported
    reason: Not proven for this package yet.
  quic.transport.cancellation.reset-stream:
    status: unsupported
    reason: quic-go raw target package does not expose reset/cancellation classification.
  http3.core.status:
    status: unsupported
    reason: Raw QUIC target does not expose HTTP/3 endpoints.
  http3.payload.bytes.1kb:
    status: unsupported
    reason: Raw QUIC target does not expose HTTP/3 endpoints.
  http3.payload.bytes.64kb:
    status: unsupported
    reason: Raw QUIC target does not expose HTTP/3 endpoints.
  http3.payload.bytes.1mb:
    status: unsupported
    reason: Raw QUIC target does not expose HTTP/3 endpoints.
unsupportedKnownCases:
  - h1
  - h2
  - h2c
  - h3
  - websocket
  - server-sent-events
ports:
  - name: quic
    protocol: udp
    hostPort: 5447
    containerPort: 5447
environment:
  PLAB_QUIC_PORT: "5447"
startup:
  port:
    name: quic
    environmentVariable: PLAB_QUIC_PORT
    default: 5447
  readiness:
    protocol: process
    timeoutSeconds: 10
readinessCheck:
  type: processStarted
  timeoutSeconds: 10
  startupDelayMilliseconds: 750
capabilities:
  - quicTransport
  - quicHandshake
  - quicStreams
  - quicMultiplexing
  - quicDuplex
entrypoint:
  kind: process
  path: bin/linux-x64/quic-go-raw
  arguments: []
  workingDirectory: .
artifactExports:
  - target.stdout.txt
  - target.stderr.txt
  - target-execution.json
qlogSupport: false
sslKeyLogSupport: false
executionMetadata:
  manifest: protocol-lab.internal.json
notes: Server-only raw QUIC package. Keep separate from quic-go HTTP/3 and quic-go raw load executor packages. quic.transport.resumption-rejected, quic.transport.resumed-handshake, quic.transport.zero-rtt-accepted, and quic.transport.zero-rtt-rejected remain unsupported until executable proof exists.
