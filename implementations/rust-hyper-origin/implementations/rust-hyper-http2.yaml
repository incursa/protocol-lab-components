schemaVersion: "1.0"
id: rust-hyper-http2
name: Rust hyper HTTP/2
description: Independent Rust hyper h2c-prior-knowledge origin built from locked source in digest-pinned images.
family: rust-hyper
role: server
targetKind: docker
targetContract: process
image: incursa-protocol-lab-rust-hyper-origin:0.1.1
dockerfile: Dockerfile
buildContext: .
baseUrl: http://127.0.0.1:8082
dockerBaseUrl: http://127.0.0.1:8082
protocolBaseUrls: {h2: http://127.0.0.1:8082}
dockerProtocolBaseUrls: {h2: http://127.0.0.1:8082}
dockerNetworkMode: published-port
certificateMode: none
roles: [server]
protocols: [h2]
supportedProtocols: [h2]
supportedWorkloadFamilies: [http.application]
protocolVersions: [h2c]
ports:
  - {name: h2, protocol: tcp, default: 8082, hostPort: 8082, containerPort: 8082}
environment: {PLAB_HTTP_PORT: "8082", PLAB_PROTOCOL: h2}
readinessCheck: {type: processStarted, timeoutSeconds: 180, startupDelayMilliseconds: 1000}
capabilities: [http.server, httpPlaintext, httpJson]
supportedProtocolVersions: [h2c]
supportedTestCaseIds: [http2.core.plaintext, http2.core.json]
supportedScenarios: [http2.core.plaintext, http2.core.json]
unsupportedKnownCases: [h1, h3, tls-alpn, websocket, server-sent-events]
requiredExternalTools: [docker]
runtime:
  upstreamProgram: hyper
  upstreamProgramModified: false
  rustVersion: 1.88.0
  hyperVersion: 1.6.0
endpoints:
  plaintext: {method: GET, path: /plaintext}
  json: {method: GET, path: /json}
shutdownBehavior: runner-owned-docker-container
artifactExports: [rust-hyper-http2.log]
qlogSupport: false
sslKeyLogSupport: false
notes: h2c-prior-knowledge Rust hyper cohort member; TLS ALPN is intentionally separate.
