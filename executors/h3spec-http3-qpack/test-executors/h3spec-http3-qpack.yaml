executorIdentity:
  id: h3spec-http3-qpack
  name: h3spec HTTP/3 and QPACK Test Executor
  version: 0.1.7
  vendor: Incursa
versionCompatibility:
  contractVersion: test-executor-v1
  compatibleContractVersions:
    - test-executor-v1
  executorVersion: 0.1.7
claimedCapabilities:
  - id: h3spec.http3
    status: supported
  - id: h3spec.qpack
    status: supported
  - id: h3spec.no-selected-cases-classification
    status: supported
  - id: target-server-lifecycle
    status: unsupported
    metadata:
      reason: h3spec targets an already prepared HTTP/3 endpoint.
  - id: quic.transport.stream-throughput.1mb
    status: unsupported
    metadata:
      reason: h3spec drives HTTP/3 and QPACK conformance checks, not raw QUIC transport load.
  - id: quic.transport.multiplex.100x64kb
    status: unsupported
    metadata:
      reason: h3spec drives HTTP/3 and QPACK conformance checks, not raw QUIC transport load.
  - id: websocket-over-h3
    status: unsupported
    metadata:
      reason: h3spec package does not execute RFC9220 WebSocket-over-H3 checks.
supportedTestSelectors:
  - selectorType: test-id
    expression: full
  - selectorType: test-id
    expression: focused
  - selectorType: test-id
    expression: qpack
  - selectorType: test-id
    expression: h3spec.http3
  - selectorType: test-id
    expression: h3spec.qpack
  - selectorType: test-id
    expression: http3.core.status
  - selectorType: test-id
    expression: http3.headers.response-headers-50x32
  - selectorType: test-id
    expression: http3.protocol.qpack-repeated-headers
  - selectorType: match
    expression: HTTP/3
  - selectorType: match
    expression: QPACK
supportedScenarioSelectors:
  - selectorType: scenario-id
    expression: http3.core.status
  - selectorType: scenario-id
    expression: http3.headers.response-headers-50x32
  - selectorType: scenario-id
    expression: http3.protocol.qpack-repeated-headers
  - selectorType: scenario-id
    expression: http3.payload.bytes.1kb
    metadata:
      status: compatible-target-unproven
      reason: Executor can target an HTTP/3 endpoint but does not measure byte payload scenarios.
  - selectorType: scenario-id
    expression: http3.payload.bytes.64kb
    metadata:
      status: compatible-target-unproven
      reason: Executor can target an HTTP/3 endpoint but does not measure byte payload scenarios.
  - selectorType: scenario-id
    expression: http3.payload.bytes.1mb
    metadata:
      status: compatible-target-unproven
      reason: Executor can target an HTTP/3 endpoint but does not measure byte payload scenarios.
supportedProtocolFamilies:
  - h3
supportedExecutionModes:
  - single-cell
  - docker
requiredTargetEndpointBindings:
  - bindingId: primary
    purpose: test-endpoint
    endpointType: http
    protocols:
      - h3
supportedArtifactTypes:
  - type: h3spec-metadata.json
    producedByStates:
      - stopped
      - failed
  - type: h3spec-results.json
    producedByStates:
      - stopped
      - failed
  - type: h3spec-report.md
    producedByStates:
      - stopped
      - failed
  - type: h3spec-stdout.txt
    producedByStates:
      - stopped
      - failed
  - type: h3spec-stderr.txt
    producedByStates:
      - stopped
      - failed
metricsAvailability:
  available: true
  availableKinds:
    - validation
    - summary
parser:
  id: protocol-lab-h3spec-json
  type: protocol-lab-h3spec-json
  preservesRawOutput: true
telemetry:
  supported: true
  supported_contract_versions:
    - telemetry-bundle-v1
  supported_scopes:
    - test-executor
  supported_artifact_kinds:
    - summary
    - stdout
    - stderr
    - raw
  export_modes:
    - artifact-bundle
executionMetadata:
  manifest: protocol-lab.internal.json
