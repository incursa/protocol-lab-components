schemaVersion: "2.0"
version: 2.0.0
id: grpc.h2.client-cancellation
title: gRPC over HTTP/2 Client Cancellation
description: Cancel after receiving fixed ready initial metadata from a server-streaming method and require client-observed CANCELLED.
status: draft
kind: protocolValidation
layer: application
protocol: h2
family: grpc
semanticTemplateId: grpc.terminal.client-cancellation
protocolStack: [grpc, h2, tls, tcp]
