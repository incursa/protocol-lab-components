schemaVersion: "2.0"
version: 2.0.0
id: tls.record.throughput
title: TLS 1.3 Record Throughput
description: Transfer one deterministic 1 MiB application-data payload over an established TLS 1.3 session.
status: draft
kind: workload
layer: transport
protocol: tls
family: tls
semanticTemplateId: transport.bulk-transfer.1mib
protocolStack: [tls1.3, tcp]
upstreamStandards: [https://www.rfc-editor.org/rfc/rfc9846]
roles: [client, server]
requires:
  capabilities: [tls.client, tls.server, tls.record.transfer]
  protocols: [tls]
  roles: [client, server]
trafficShape: streaming-download
tls:
  profileId: plab-tls13-p256-v1
  version: tls1.3
  mode: record-throughput
  resumptionPolicy: not-offered
  earlyData: not-attempted
  serverName: tls.plab.test
  applicationDataBytes: 1048576
  payloadGenerator: repeated-octet
  payloadOctet: 90
  payloadSha256: bf63d8a95fcc2e64619813aae35fdcbe871fdd9264caa3f365eb3aed0f679129
  alpn: protocol-lab-tls
  certificateProfile: plab-single-leaf-p256-v1
  cipherSuite: TLS_AES_128_GCM_SHA256
  keyExchangeGroup: x25519
  signatureScheme: ecdsa_secp256r1_sha256
  peerAuthentication: server-certificate-required
  connectionLifecycle: pre-established-full-authenticated-connection
  measuredWindow: application-data-transfer
  direction: server-to-client
  prerequisitePolicy: unmeasured-full-handshake-before-measured-transfer
  warmupIsolation: warmup-state-not-reused-by-measurement
executionProfile: {transportSecurity: tls, protocolVariant: tls1.3-record, implementationRole: library-backed-target, selectedComponentProofRequired: true, executionModePolicy: record-effective-mode, platformProvenanceRequired: true, accelerationProvenanceRequired: true}
validation:
  required: true
  checks: [protocol:tls1.3, no-fallback, handshake-complete, application-data-complete, payload-size:1048576, payload-sha256, zero-unexpected-failures, zero-timeouts]
  protocol: {requested: tls1.3, expectedObserved: tls1.3, fallbackAllowed: false}
benchmarkCompat:
  compatibleLoadShapes: [smoke, diagnostic, regression, comparison, soak]
  primaryMetrics: [bytesPerSecond, transferLatencyP50, transferLatencyP95, transferLatencyP99, failedOperations, timedOutOperations]
requiredMetrics: [bytesPerSecond, transferLatencyMean, transferLatencyP50, transferLatencyP75, transferLatencyP90, transferLatencyP95, transferLatencyP99, totalTransferredBytes, completedOperations, failedOperations, timedOutOperations]
artifacts:
  required: [validation.json, protocol-proof.json, tls-negotiation.json, payload-hash.json, result.json, load.stdout.log, load.stderr.log]
  optional: [target-telemetry.json, load-generator-telemetry.json, network-summary.json]
availability: {onUnsupported: unsupported, onUnavailable: unavailable, onBindingMismatch: validation-failed, knownUnsupported: [tls1.3-downgrade, payload-hash-unavailable]}
networkProfile: clean
tags: [tls, tls1.3, record, throughput, 1mib]
